  .pdf-zoom-btn{background:transparent;color:var(--paper);border:1px solid rgba(244,242,236,.35);padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .15s,color .15s;display:inline-flex;align-items:center;gap:8px}
  .pdf-zoom-btn:hover{background:var(--paper);color:var(--ink)}
  .pdf-zoom-btn.on{background:var(--paper);color:var(--ink)}

  /* Version toggle (Gorillaz) inside reader */
  .pdf-version-toggle{display:inline-flex;gap:0;border:1px solid rgba(244,242,236,.3);margin-right:8px}
  .pdf-version-toggle button{background:transparent;color:rgba(244,242,236,.6);border:none;border-right:1px solid rgba(244,242,236,.2);padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;cursor:pointer}
  .pdf-version-toggle button:last-child{border-right:none}
  .pdf-version-toggle button.on{background:var(--paper);color:var(--ink)}
  .pdf-canvas-stack{position:relative;display:flex;gap:8px;align-items:center;justify-content:center;max-width:100%;max-height:100%}
  /* Alt visual recolor for Gorillaz (yellow/green) */
  .pdf-canvas.alt-yellow{filter:sepia(.4) saturate(2.4) hue-rotate(20deg) brightness(1.05)}

  /* MODAL — old declarations below preserved */
  .modal-inner{position:relative;background:var(--paper);width:min(1480px,100%);max-height:94vh;display:grid;grid-template-columns:1.4fr 0.6fr;overflow:hidden;transform:translateY(12px) scale(.985);transition:transform .3s cubic-bezier(.2,.8,.2,1)}
  .modal-inner.pdf-fullscreen{width:96vw;height:96vh;max-height:96vh;grid-template-columns:1fr}
  .modal-inner.pdf-fullscreen .modal-info{display:none}
  .modal-inner.pdf-fullscreen .modal-img-col{max-height:96vh;background:#0a0907}
  .modal-inner.pdf-fullscreen .pdf-reader{height:96vh}
  .modal-inner.pdf-fullscreen .pdf-canvas{max-height:calc(96vh - 100px)}
  .modal.open .modal-inner{transform:translateY(0) scale(1)}
  .modal-img-col{background:#fff;position:relative;min-height:420px;max-height:92vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .modal-img-col.bw img{filter:grayscale(1) contrast(1.18) brightness(1.06)}
  .modal-img-col img,.modal-img-col canvas,.modal-img-col video{max-width:100%;max-height:92vh;width:auto;height:auto;object-fit:contain;background:#fff}
  .modal-img-col video{width:100%;height:auto}
  .modal-img-col iframe{width:100%;height:92vh;max-height:92vh;border:none;background:#fff}
  .modal-mini{position:absolute;bottom:16px;left:16px;display:flex;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.18em;z-index:3}
  .modal-mini button{background:var(--ink);color:var(--paper);border:none;padding:9px 12px;font-size:inherit;font-family:inherit;letter-spacing:inherit;cursor:pointer;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px}
  .modal-mini button:hover{background:var(--mute)}
  .modal-mini .counter{background:rgba(244,242,236,.94);color:var(--ink);padding:9px 12px}
  /* La nav de ASSETS (modal-mini) se superpone con los controles de PÁGINA del lector PDF.
     Cuando el asset actual es un PDF la movemos arriba-izquierda para que no choque con
     los controles de página (Anterior/Siguiente) del lector y siga siendo accesible. */
  .modal-mini-pdf{top:16px;bottom:auto;left:16px;z-index:7}
  .modal-info{padding:36px 32px 28px;display:flex;flex-direction:column;overflow-y:auto;max-height:92vh;min-height:0}
  .modal-info .k{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);margin-bottom:18px;display:flex;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid var(--rule)}
  /* La fila superior de info (categoría · año) comparte tope con el botón × (cerrar).
     Corremos el año a la izquierda lo justo para que la × no lo tape — sin acortar la línea. */
  .modal-info .k span:last-child{margin-right:48px}
  .modal-info h3{font-family:'Poppins',sans-serif;font-weight:700;font-size:30px;line-height:1.08;letter-spacing:-.022em;text-transform:none;margin-bottom:24px;text-wrap:balance;padding-bottom:2px}
  .modal-info .meta{display:flex;flex-direction:column;gap:0;margin-bottom:20px}
  .modal-info .meta div{padding:12px 0;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:100px 1fr;gap:16px;align-items:baseline}
  .modal-info .meta .lab{color:var(--mute)}
  .modal-info .meta .val{color:var(--ink);font-weight:600}
  .modal-info p{font-family:'Poppins',sans-serif;font-size:14.5px;line-height:1.65;color:var(--ink);text-wrap:pretty}
  .modal-thumbs{margin-top:24px;padding-top:20px;border-top:1px solid var(--rule)}
  .modal-thumbs .k{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);margin-bottom:14px}
  .thumbs-section{margin-bottom:18px}
  .thumbs-section:last-child{margin-bottom:0}
  .thumbs-section-h{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink);font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--rule-soft)}

  /* Section-jump nav inside the modal (used by tesis & long projects) */
  .modal-sec-nav{display:flex;gap:6px;flex-wrap:wrap;padding:14px 0 18px;margin-bottom:14px;border-bottom:1px solid var(--rule-soft);position:sticky;top:0;background:var(--paper);z-index:4}
  .modal-sec-nav-l{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);width:100%;margin-bottom:4px}
  .modal-sec-nav button{appearance:none;background:transparent;border:1px solid var(--rule);color:var(--ink);padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .15s,color .15s,border-color .15s;display:inline-flex;align-items:center;gap:6px}
  .modal-sec-nav button .n{color:var(--mute);font-weight:400;letter-spacing:.16em}
  .modal-sec-nav button:hover{border-color:var(--ink)}
  .modal-sec-nav button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .modal-sec-nav button.on .n{color:rgba(244,242,236,.65)}

  /* Section anchor inside the thumbs strip */
  .thumbs-section{scroll-margin-top:90px}
  .thumbs-section-h{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .thumbs-section-h .h-l{display:flex;align-items:center;gap:8px}
  .thumbs-section-h .h-l::before{content:'';display:inline-block;width:5px;height:5px;background:var(--ink);border-radius:50%}
  .thumbs-section-h .h-n{color:var(--mute);font-weight:400;letter-spacing:.18em}
  .thumbs-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px}
  .thumb{width:100%;aspect-ratio:1;background:#fff;cursor:pointer;overflow:hidden;position:relative;transition:opacity .15s;opacity:.55}
  .thumb:hover{opacity:1}
  .thumb.on{opacity:1;outline:2px solid var(--ink);outline-offset:-2px}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .pill{position:absolute;top:4px;left:4px;background:var(--ink);color:var(--paper);font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.15em;padding:2px 5px;line-height:1.2}
  .modal-actions{display:flex;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--rule)}
  .modal-actions button,.modal-actions a{appearance:none;background:transparent;color:var(--ink);border:1px solid var(--ink);padding:12px 18px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;cursor:pointer;text-decoration:none;transition:background .2s,color .2s}
  .modal-actions button:hover,.modal-actions a:hover{background:var(--ink);color:var(--paper)}
  .modal-actions .primary{background:var(--ink);color:var(--paper)}
  .modal-actions .primary:hover{background:transparent;color:var(--ink)}

  /* Floating × close button on modals + readers */
  .modal-x{position:absolute;top:16px;right:16px;z-index:50;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--ink);color:var(--paper);border:none;font-size:22px;line-height:1;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:400;transition:background .15s,color .15s,transform .15s}
  .modal-x:hover{background:var(--paper);color:var(--ink);transform:rotate(90deg)}
  .modal-dark .modal-x{background:#f4f2ec;color:#0a0907}
  .modal-dark .modal-x:hover{background:#0a0907;color:#f4f2ec;outline:1px solid #f4f2ec}
  .reader-x{position:fixed;top:24px;right:24px;z-index:10003;background:#f4f2ec;color:#0c0c0c;width:46px;height:46px;font-size:24px}
  .reader-x:hover{background:#0c0c0c;color:#f4f2ec;outline:1px solid #f4f2ec}

  /* ── MODAL-DARK — black & white modal for Ilustración ── */
  .modal-dark.modal{background:rgba(8,7,5,.95)}
  .modal-dark .modal-inner{background:#0a0907;color:#f4f2ec}
  .modal-dark .modal-img-col{background:#0a0907}
  .modal-dark .modal-img-col.bw{background:#0a0907}
  .modal-dark .modal-img-col img{filter:brightness(.95) contrast(1.04)}
  .modal-dark .modal-img-col.bw img{filter:grayscale(1) contrast(1.06) brightness(.86)}
  .modal-dark .modal-info{background:#0a0907;color:#f4f2ec}
  .modal-dark .modal-info .k{color:rgba(244,242,236,.55);border-bottom-color:rgba(244,242,236,.16)}
  .modal-dark .modal-info h3{color:#f4f2ec}
  .modal-dark .modal-info .meta div{border-bottom-color:rgba(244,242,236,.16)}
  .modal-dark .modal-info .meta .lab{color:rgba(244,242,236,.55)}
  .modal-dark .modal-info .meta .val{color:#f4f2ec}
  .modal-dark .modal-info p{color:rgba(244,242,236,.85)}
  .modal-dark .modal-actions{border-top-color:rgba(244,242,236,.16)}
  .modal-dark .modal-actions button,.modal-dark .modal-actions a{background:transparent;color:#f4f2ec;border-color:#f4f2ec}
  .modal-dark .modal-actions button:hover,.modal-dark .modal-actions a:hover{background:#f4f2ec;color:#0a0907}
  .modal-dark .modal-actions .primary{background:#f4f2ec;color:#0a0907;border-color:#f4f2ec}
  .modal-dark .modal-actions .primary:hover{background:transparent;color:#f4f2ec}
  .modal-dark .modal-mini button{background:#f4f2ec;color:#0a0907}
  .modal-dark .modal-mini button:hover{background:rgba(244,242,236,.7)}
  .modal-dark .modal-mini .counter{background:rgba(244,242,236,.9);color:#0a0907}

  /* COMIC READER */
  .reader{position:fixed;inset:0;background:rgba(10,10,10,.96);z-index:10001;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px}
  .reader.open{display:flex}
  .reader-bar{width:min(1240px,100%);display:flex;justify-content:space-between;align-items:center;color:var(--paper);padding-bottom:16px;border-bottom:1px solid rgba(244,242,236,.15);margin-bottom:20px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase}
  .reader-bar .title{font-family:'Poppins',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.015em;text-transform:none}
  .reader-bar button{background:transparent;color:var(--paper);border:1px solid rgba(244,242,236,.5);padding:8px 14px;font-family:inherit;font-size:inherit;letter-spacing:inherit;cursor:pointer;text-transform:uppercase}
  .reader-bar button:hover{background:var(--paper);color:var(--ink);border-color:var(--paper)}
  .reader-stage{width:100%;flex:1;display:flex;align-items:center;justify-content:center;gap:14px}
  .reader-stage img{max-height:78vh;max-width:100%;object-fit:contain;background:#fff}
  .reader-controls{display:flex;gap:10px;margin-top:20px;align-items:center;color:var(--paper);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase}
  .reader-controls button{appearance:none;background:transparent;color:var(--paper);border:1px solid rgba(244,242,236,.5);padding:11px 18px;font-family:inherit;font-size:inherit;letter-spacing:inherit;cursor:pointer;text-transform:uppercase;font-weight:600}
  .reader-controls button:hover:not(:disabled){background:var(--paper);color:var(--ink);border-color:var(--paper)}
  .reader-controls button:disabled{opacity:.25;cursor:not-allowed}
  .reader-mode{display:flex;border:1px solid rgba(244,242,236,.3)}
  .reader-mode button{padding:9px 14px;background:transparent;color:rgba(244,242,236,.6);border:none;border-right:1px solid rgba(244,242,236,.3);font-family:inherit;font-size:inherit;letter-spacing:inherit;cursor:pointer;text-transform:uppercase;font-weight:600}
  .reader-mode button:last-child{border-right:none}
  .reader-mode button.on{background:var(--paper);color:var(--ink)}

  /* ── HEROES & ANIME — FLAGSHIP MEGA-BLOCK (Spider hero + split row) ── */
  .se-flagship{margin-bottom:120px}
  .se-flagship-sub{margin-top:20px}
  .se-flagship-sub-head{display:flex;align-items:baseline;justify-content:space-between;gap:18px;padding-bottom:14px;margin-bottom:18px;border-bottom:1px solid rgba(244,242,236,.16)}
  .se-flagship-sub-h{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(22px,2.4vw,34px);line-height:1;letter-spacing:-.025em;color:#f4f2ec}
  .se-flagship-sub-n{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(244,242,236,.55)}
  /* Spider bento — 4-col with first card 2×2 */
  .se-spider-bento{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .se-spider-bento > .gcard:first-child{grid-column:span 2;grid-row:span 2}
  /* Marvel+Anime split row */
  .se-flagship-split{display:grid;grid-template-columns:1fr 1.3fr;gap:40px;margin-top:48px}
  .se-flagship-col{display:flex;flex-direction:column}
  .se-flagship-grid{display:grid;gap:14px}
  .se-flagship-grid.c3{grid-template-columns:repeat(3,1fr)}
  .se-flagship-grid.c4{grid-template-columns:repeat(4,1fr)}
  .se-flagship-grid .gcard-img{aspect-ratio:1}

  /* ── ATUS ROCK — compact horizontal strip ── */
  .se-compact{margin-bottom:72px}
  .se-rock-strip{display:flex;flex-direction:column;gap:18px}
  .se-rock-group{display:grid;grid-template-columns:90px 1fr;gap:24px;align-items:center;padding:14px 0;border-top:1px solid rgba(244,242,236,.1)}
  .se-rock-group:first-child{border-top:none;padding-top:0}
  .se-rock-sub{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#f4f2ec;font-weight:700}
  .se-rock-pieces{display:flex;gap:12px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:rgba(244,242,236,.25) transparent;padding-bottom:4px}
  .se-rock-pieces::-webkit-scrollbar{height:6px}
  .se-rock-pieces::-webkit-scrollbar-thumb{background:rgba(244,242,236,.25)}
  .se-rock-card{flex:0 0 160px;cursor:pointer;display:flex;flex-direction:column;gap:6px}
  .se-rock-card .gcard-img{aspect-ratio:1;background:#13110f;overflow:hidden}
  .se-rock-card .gcard-img img{width:100%;height:100%;object-fit:cover;filter:brightness(.92) contrast(1.02) saturate(.95);transition:filter .2s,transform .4s cubic-bezier(.2,.8,.2,1)}
  .se-rock-card:hover .gcard-img img{transform:scale(1.04);filter:brightness(1) contrast(1.04)}
  .se-rock-card-t{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(244,242,236,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .se-rock-card:hover .se-rock-card-t{color:#f4f2ec}

  /* ── SERIES CORTAS — Rivalry destacada + sub row ── */
  .se-shorts-rivalry{margin-bottom:48px}
  .se-shorts-rivalry-head{display:flex;align-items:baseline;justify-content:space-between;gap:18px;padding-bottom:14px;margin-bottom:18px;border-bottom:1px solid rgba(244,242,236,.16)}
  .se-shorts-h{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(20px,2.2vw,30px);line-height:1;letter-spacing:-.022em;color:#f4f2ec}
  .se-shorts-n{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(244,242,236,.55)}
  .se-shorts-rivalry-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .se-shorts-rivalry-grid .gcard-img{aspect-ratio:4/3}
  .se-shorts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:start}
  .se-shorts-card{display:flex;flex-direction:column;gap:10px;padding-top:18px;border-top:1px solid rgba(244,242,236,.1)}
  .se-shorts-card .se-shorts-h{font-size:clamp(16px,1.6vw,20px)}
  .se-shorts-card .gcard{cursor:pointer}
  .se-shorts-card > .gcard .gcard-img{aspect-ratio:1}
  .se-shorts-inner{display:grid;gap:10px}
  .se-shorts-inner.c2{grid-template-columns:repeat(2,1fr)}

  /* ── Video viewer in modal: autoplay + mute toggle ── */
  .av-video{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000}
  .av-video video{max-width:100%;max-height:92vh;width:auto;height:auto}
  .av-mute{position:absolute;top:16px;right:16px;display:inline-flex;align-items:center;gap:8px;background:rgba(244,242,236,.95);color:var(--ink);border:none;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;cursor:pointer;z-index:5;transition:background .15s,color .15s}
  .av-mute:hover{background:var(--ink);color:var(--paper)}
  .av-mute.is-on{background:#f4d03f;color:var(--ink)}
  .av-mute.is-on:hover{background:var(--ink);color:#f4d03f}
  .av-mute-ico{font-size:14px;line-height:1}
  .av-mute-l{font-size:10px}

  /* ── ANIMATED COVER — cycles through videos on the project card ── */
  .anim-cover{position:relative;width:100%;height:100%;background:#0c0c0c;overflow:hidden}
  .anim-cover video{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
  .anim-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg, rgba(12,12,12,0) 60%, rgba(12,12,12,.5) 100%);pointer-events:none}
  .anim-cover-overlay{position:absolute;left:14px;bottom:12px;display:flex;flex-direction:column;gap:3px;color:var(--paper);font-family:'JetBrains Mono',monospace;letter-spacing:.18em;text-transform:uppercase;text-shadow:0 1px 4px rgba(0,0,0,.5);pointer-events:none}
  .anim-cover-i{font-size:10px;color:rgba(244,242,236,.85);font-weight:700}
  .anim-cover-t{font-family:'Poppins',sans-serif;font-size:13px;letter-spacing:-.005em;text-transform:none;color:#fff;font-weight:500}
  .anim-cover-mute{top:14px;right:14px;padding:8px 12px;font-size:10px}

  /* ── PROJECT GROUP BANNER (sutil, tipo separador editorial) ── */
  .pj-group-banner{padding:40px 0 4px;margin-top:24px;border-top:1px solid var(--rule);display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;position:relative}
  .pj-group-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--mute);white-space:nowrap}
  .pj-group-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(22px,2.4vw,30px);line-height:1;letter-spacing:-.022em;color:var(--ink)}
  .pj-group-sub{font-family:'Poppins',sans-serif;font-size:13px;color:var(--mute);text-wrap:pretty;flex:1;min-width:220px}
  .pj-group-meta{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink);font-weight:700;border:1px solid var(--ink);padding:5px 10px;white-space:nowrap}

  /* MOBILE */
  @media (max-width:980px){
    .wrap{padding:0 22px}
    .nav{padding:12px 22px}
    .nav-mid{display:none}
    .nav-burger{display:inline-flex}
    .nav-right .lang-btn{display:none}
    /* En mobile .nav-mid (display:none) sale del grid y el auto-placement
       corría .nav-right a la columna del medio (burger pegado al logo).
       Lo anclamos a la 3ª columna para que el burger quede a la derecha. */
    .nav-mark{grid-column:1}
    .nav-right{grid-column:3;justify-self:end}
    .nav.menu-open .nav-mid{display:flex;flex-direction:column;gap:18px;position:absolute;top:100%;left:0;right:0;background:var(--ink);border-bottom:1px solid rgba(244,242,236,.12);padding:22px}
    .nav.menu-open .nav-right{width:100%;padding:0 22px 18px}
    .nav.menu-open .nav-right .lang-btn{display:inline-flex}
    .hero{padding:120px 0 64px;min-height:auto;gap:32px}
    /* LANDING (home): ocupa EXACTAMENTE una pantalla. El logo + intro se centran
       en el medio (fila 1fr) y las dos tarjetas apiladas quedan pegadas al fondo,
       así el borde inferior de la pantalla coincide con el fin de la tarjeta de
       Ilustración y la sección 03 queda recién debajo del fold (sin hueco raro). */
    .hero-landing{min-height:100vh;min-height:100svh;grid-template-rows:auto 1fr auto;padding:84px 0 0;gap:10px}
    .hero-landing .hero-main{padding:0 22px;justify-content:center;gap:4px}
    .hero-eyebrow{margin-bottom:0}
    .hero-logo{max-height:24vh}

    .pj.flip:has(.pj-img img[src*="sm-lp-"]),

    .comic-pages{grid-template-columns:repeat(3,1fr);gap:14px}

    /* Stats en mobile: una sola columna, sin bordes/paddings que hagan chocar el texto */

    .about-stat:nth-child(odd),.about-stat:nth-child(even){padding-left:0;padding-right:0;border-left:none}
    .about-stat .k{font-size:10px}
    .about-stat .v{font-size:15px}
    .contact{padding:80px 0}
    .contact-grid{grid-template-columns:1fr}
    .ci{border-left:none!important;padding-left:0!important;border-bottom:1px solid rgba(244,242,236,.18)}

    .modal{padding:10px}
    .modal-inner{grid-template-columns:1fr;max-height:94vh;overflow-y:auto}

    .modal-info{padding:24px 22px}
    /* Título del proyecto en mobile: más chico y con line-height cómodo para que no se corte */
    .modal-info h3{font-size:23px;line-height:1.12;margin-bottom:18px}
    /* La nav de secciones no debe quedar sticky/apretada en mobile */
    .modal-sec-nav{position:static;padding:12px 0 14px}
    /* PDF reader en mobile: ocupa toda la pantalla y NO comparte columna con la info */
    .modal-inner:has(.pdf-reader){max-height:96vh;height:96vh;overflow:hidden;grid-template-columns:1fr;grid-template-rows:1fr}
    .modal-inner:has(.pdf-reader) .modal-info{display:none}
    /* La nav de ASSETS (modal-mini) en mobile: barra de arriba acotada para NO pisar el
       botón de cerrar (right:62px), botones sólo flecha (← →) y el contador "Leer
       revista · 1/6" en UNA línea (sin cortarse ni partir en dos). */
    .modal-mini-pdf{top:12px;bottom:auto;left:12px;right:62px;gap:5px;align-items:center}
    .modal-mini-pdf .mm-label{display:none}
    .modal-mini-pdf button{padding:9px 11px;flex-shrink:0}
    .modal-mini-pdf .counter{white-space:nowrap;font-size:10px;letter-spacing:.1em}
    /* En mobile el botón de SONIDO del video y la × de cerrar quedaban los dos arriba a
       la derecha y se pisaban. Movemos el de sonido a la izquierda. */
    .modal-img-col .av-mute:not(.anim-cover-mute){left:14px;right:auto}
    .modal-img-col:has(.pdf-reader){min-height:0;max-height:96vh;height:96vh}
    .modal-img-col .pdf-reader{height:96vh}
    .modal-img-col .pdf-canvas{max-height:calc(96vh - 172px)}
    .modal-img-col:has(.pdf-reader) iframe{height:96vh}
    /* En mobile, el modo "Libro" (dos páginas) achica demasiado: una sola página por defecto */
    .pdf-page-wrap.is-spread .pdf-canvas{max-width:calc(50% - 4px)}
    /* Barra de controles del lector: en mobile apila en filas y deja de superponer botones */
    .pdf-controls{flex-wrap:wrap;justify-content:center;gap:8px 10px;padding:12px 14px}
    .pdf-nav{order:3;width:100%;gap:8px}
    .pdf-nav button{flex:1;text-align:center;padding:12px 8px}
    .pdf-info{order:1;width:100%;text-align:center}
    .pdf-controls > div:last-child{order:2;flex-wrap:wrap;justify-content:center;gap:8px}
    /* flechas laterales del stage: más chicas y pegadas al borde para no tapar la página */
    .pdf-edge{width:40px;height:56px;font-size:24px}
    .pdf-edge-l{left:6px}
    .pdf-edge-r{right:6px}
    .footer{padding:20px 0}
    /* ILUSTRACION mobile */
    .se-feature{grid-template-columns:1fr;gap:24px;margin-bottom:64px;padding-bottom:56px}
    .se-block{margin-bottom:72px}
    .se-huh{grid-template-columns:repeat(2,1fr)}
    .se-huh > .gcard:first-child{grid-column:span 2;grid-row:span 1}
    .se-spider{grid-template-columns:repeat(3,1fr)}
    .se-spider > .gcard:first-child{grid-column:span 2;grid-row:span 2}
    .se-row-3,.se-triptych{grid-template-columns:repeat(2,1fr)}
    .se-rack{grid-template-columns:repeat(3,1fr)}
    .se-sound-row{grid-template-columns:1fr;gap:14px}
    .se-sound-label{position:static}
    .se-sound-pieces.c2,.se-sound-pieces.c3{grid-template-columns:repeat(2,1fr)}
    .se-mix{grid-template-columns:1fr;gap:32px}
    .se-mix-grid.c3,.se-mix-grid.c4{grid-template-columns:repeat(3,1fr)}
    .se-shorts{grid-template-columns:1fr;gap:32px}
    .se-singles{grid-template-columns:repeat(3,1fr)}
    .se-singles > .gcard:nth-child(7n+4){grid-column:span 1;grid-row:span 1}
    .se-caras{grid-template-columns:1fr 1fr}
    .se-caras .gcard-big{grid-column:span 2}
    .se-scroll-item{flex:0 0 220px}
    .pj-posters-wall{grid-template-columns:repeat(4,1fr);grid-auto-rows:100px}
    .pj-poster.pp-0{grid-column:span 2;grid-row:span 3}
    .pj-poster.pp-1{grid-column:span 2;grid-row:span 2}
    .pj-poster.pp-2{grid-column:span 1;grid-row:span 1}
    .pj-poster.pp-3{grid-column:span 1;grid-row:span 1}
    .pj-poster.pp-4{grid-column:span 2;grid-row:span 1}
    .pj-poster.pp-pdf{grid-column:span 2;grid-row:span 1}
    .pj-posters-foot{grid-template-columns:1fr;gap:24px}
    .pj-3d-hero{min-height:240px;aspect-ratio:4/3}

    .pj-tesis-section{padding:24px 0}
    .pj-tesis-slug{grid-template-columns:1fr;gap:14px;padding:20px 0}

    .pj-tesis-slug-r{justify-content:flex-start}
    .pj-tesis-hero-wrap{padding:36px 0 36px}
    .pj-tesis-hero{grid-template-columns:1fr;min-height:auto}

       la imagen. Con height fijo el ancho sigue la celda (100%) y no desborda. */
    .pj-tesis-hero-img{min-height:0;height:300px;aspect-ratio:auto;min-width:0}
    .pj-tesis-hero-text{padding:32px 24px;border-left:none;border-top:1px solid var(--rule)}

    .pj-tesis-index-wrap{padding:40px 0 24px}

    .pj-tesis-row-systems{grid-template-columns:1fr;gap:10px}
    .pj-tesis-row-propuestas{grid-template-columns:1fr;gap:10px}
    .pj-tesis-chapter.system{aspect-ratio:16/10}
    .pj-tesis-chapter.propuesta{aspect-ratio:16/10;min-height:240px}
    .pj-group-banner{padding:28px 0 4px;gap:10px}
    .pj-rail-arr{width:38px;height:72px;font-size:24px}
    .pj-posters-stage{grid-template-columns:1fr;gap:18px}
    .pj-posters-hero-img{min-height:340px}
    .pj-posters-side{grid-template-columns:repeat(3,1fr);grid-auto-rows:minmax(140px,1fr)}

    .se-flagship-grid.c3,.se-flagship-grid.c4{grid-template-columns:repeat(3,1fr)}
    .se-rock-group{grid-template-columns:1fr;gap:8px}
    .se-shorts-rivalry-grid{grid-template-columns:1fr}
    .se-shorts-row{grid-template-columns:1fr;gap:24px}
    .se-shorts-inner.c2{grid-template-columns:repeat(2,1fr)}

    .pj-9r-row-img{width:80px;height:60px}
    .pj-9r-list-group-h{padding:12px 14px;font-size:10.5px;letter-spacing:.18em}

    /* ── KOIZONE mobile ── */
    .pj-koizone{padding:56px 0;gap:20px}

    /* ── Barra "Volver a inicio" en mobile: padding más chico, el botón no se

    .section-view-bar{padding:12px 22px;gap:16px;margin-top:56px}
    .section-view-bar button{flex-shrink:0;white-space:nowrap;padding:9px 12px}
    .section-view-bar button span{white-space:nowrap}
    .section-view-bar .label-r{text-align:right;line-height:1.35}

  @media (max-width:540px){

    .hero-top,.hero-bot{font-size:10px;gap:8px}

    .pj-9r-row{grid-template-columns:64px 1fr;gap:12px;padding:10px 12px}

    /* ── 3D small phone ── */
    .pj-3d-hero-label{padding:18px}

    /* ── Barra "Volver a inicio" en teléfonos chicos: apilada para que el botón
       y la etiqueta no se choquen ── */
    .section-view-bar{flex-direction:column;align-items:flex-start;gap:8px;padding:12px 18px}
    .section-view-bar .label-r{text-align:left}
  }

  /* ─────────────────────────────────────────────────────────────────────
     FIX WebKit / Safari (iOS + macOS): las cajas de imagen con aspect-ratio
     que contienen un <img width:100%;height:100%> entraban en un loop de
     layout y CRECÍAN sin límite al scrollear (peor con loading="lazy", como
     en Gorillaz), llegando a cubrir/romper la página. Sacar la imagen del
     flujo con position:absolute corta ese loop: la caja conserva su tamaño
     por aspect-ratio y object-fit mantiene el encuadre y el centrado igual.
     Sólo afecta cajas de imagen única (la leyenda va como hermana, no encima). */
  .pj-img, .se-feature-img, .gcard-img, .pj-poster-mini-img, .pj-tesis-piece-img,
  .pdf-page-card-img, .pj-gorillaz-pair-img, .pj-koizone-tile-img,
  .pj-gorillaz-block-img, .pj-gorillaz-version-img, .about-r,
  .pj-9r-section-cover { position: relative; }

  .pj-img > img, .se-feature-img > img, .gcard-img > img, .pj-poster-mini-img > img,
  .pj-tesis-piece-img > img, .pdf-page-card-img > img, .pj-gorillaz-pair-img > img,
  .pj-koizone-tile-img > img, .pj-gorillaz-block-img > img,
  .pj-gorillaz-version-img > img, .about-r > img, .pj-9r-section-cover > img {
    position: absolute; inset: 0;
  }

  /* Ítems de grilla que deben poder achicarse para no desbordar el viewport
     (sin esto, el contenido fija un ancho mínimo y rompe la grilla en mobile). */
  .pj-gorillaz-pair, .pj-gorillaz-strip, .pj-gorillaz-versions,
  .pj-koizone-grid, .pj-koizone-stage, .pj-9r-stage { min-width: 0; }
  .pj-gorillaz-pair-item, .pj-gorillaz-block, .pj-gorillaz-version,
  .pj-koizone-tile, .pj-koizone-flip, .pj-koizone-side { min-width: 0; }
</style>

<script type="text/babel" data-presets="env,react">

const { useState, useEffect, useMemo, useRef } = React;
const DESIGN = JSON.parse(document.getElementById('design-data').textContent);
const WORKS = JSON.parse(document.getElementById('works-data').textContent);
const COMIC = JSON.parse(document.getElementById('comic-data').textContent);
const I18N = JSON.parse(document.getElementById('i18n').textContent);

const getLang = () => {
  const s = localStorage.getItem('atus_lang');
  return s && I18N[s] ? s : 'es';
};

// Tiny module-level cache so we don't re-render the same PDF cover twice
const __pdfThumbCache = {};

// Lightweight PDF first-page thumbnail (renders to canvas, replaces static cov-*.png)
function PdfThumb({ src, fallback, className, alt }) {
  const [dataUrl, setDataUrl] = useState(__pdfThumbCache[src] || null);
  const [errored, setErrored] = useState(false);

  useEffect(() => {
    if (__pdfThumbCache[src]) {setDataUrl(__pdfThumbCache[src]);return;}
    // Si hay portada estática, la usamos directamente y NO abrimos el PDF para la
    // miniatura. Las portadas correctas (afiche, tapa de Koizone, etc.) ya están
    // generadas como imagen, así que rasterizar el PDF sería lento, pesado (Koizone
    // son 16MB con imágenes de 17 megapíxeles) y en iOS reventaba la memoria.
    if (fallback) {return;}
    // En file:// (zip descargado, abierto local) pdf.js no puede fetchar los PDFs.
    // Usamos directamente la imagen de portada estática.
    if (window.__IS_FILE_PROTOCOL) {setErrored(true);return;}
    if (!window.pdfjsLib) {setErrored(true);return;}
    let cancelled = false;
    pdfjsLib.getDocument(src).promise.then(async (pdf) => {
      const page = await pdf.getPage(1);
      const v1 = page.getViewport({ scale: 1 });
      const scale = 600 / v1.width;
      const vp = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = vp.width;canvas.height = vp.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      const url = canvas.toDataURL('image/jpeg', 0.82);
      __pdfThumbCache[src] = url;
      if (!cancelled) setDataUrl(url);
    }).catch(() => {if (!cancelled) setErrored(true);});
    return () => {cancelled = true;};
  }, [src]);

  if (dataUrl) return <img src={dataUrl} alt={alt || ''} className={className} loading="lazy" />;
  if (errored && fallback) return <img src={fallback} alt={alt || ''} className={className} loading="lazy" />;
  // While loading: show fallback (cover) immediately so the user never sees empty box
  if (fallback) return <img src={fallback} alt={alt || ''} className={className} loading="lazy" />;
  // En file:// sin fallback: mostramos un placeholder con el nombre del PDF
  if (window.__IS_FILE_PROTOCOL && errored) {
    const name = (src || '').split('/').pop().replace(/\.pdf$/i, '').replace(/[-_]/g, ' ');
    return (
      <div className={className} style={{
        background:'#1a1a1a', color:'#f4f2ec', display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center', gap:10, padding:24, textAlign:'center'
      }}>
        <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'.22em', textTransform:'uppercase', opacity:.5 }}>Documento PDF</div>
        <div style={{ fontFamily:"'Poppins',sans-serif", fontSize:14, fontWeight:500, opacity:.92, textTransform:'capitalize' }}>{name}</div>
        <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'.2em', textTransform:'uppercase', opacity:.4, marginTop:6 }}>Abrir proyecto →</div>
      </div>
    );
  }
  return <div className={className} style={{ background: '#f4f2ec' }}></div>;
}

// Renders ALL pages of a PDF as a clickable grid (Gero-comic style)
// Each thumb is rendered once and cached, then displayed at small size.
const __pdfPagesCache = {};
function PdfPagesGrid({ src, cols = 4, max = 24, onClickPage }) {
  const [pages, setPages] = useState(__pdfPagesCache[src] || []);
  const [total, setTotal] = useState(0);
  const [loading, setLoading] = useState(true);

  // En file:// no podemos rasterizar las páginas. Mostramos un solo card que
  // abre el PDF en el visor nativo del navegador (en pestaña nueva).
  if (window.__IS_FILE_PROTOCOL) {
    return (
      <div className="pdf-pages-grid pdf-pages-grid-local" style={{ gridTemplateColumns: `repeat(${cols},1fr)` }}>
        <a className="pdf-page-card pdf-page-card-open" href={src} target="_blank" rel="noopener">
          <div className="pdf-page-card-img" style={{ display:'flex', alignItems:'center', justifyContent:'center', background:'#f4f2ec', color:'#111', fontFamily:'JetBrains Mono, monospace', fontSize:11, letterSpacing:'.18em', textTransform:'uppercase', textAlign:'center', padding:18, lineHeight:1.5 }}>
            Abrir PDF<br/><span style={{opacity:.55, fontSize:9}}>en pestaña nueva</span>
          </div>
          <span className="pdf-page-card-n">{src.split('/').pop()}</span>
        </a>
      </div>
    );
  }

  useEffect(() => {
    if (__pdfPagesCache[src] && __pdfPagesCache[src].length > 0) {
      setPages(__pdfPagesCache[src]);
      setLoading(false);
      return;
    }
    if (!window.pdfjsLib) { setLoading(false); return; }
    let cancelled = false;
    setLoading(true);
    setPages([]);
    pdfjsLib.getDocument(src).promise.then(async (pdf) => {
      if (cancelled) return;
      setTotal(pdf.numPages);
      const limit = Math.min(max, pdf.numPages);
      const out = [];
      for (let i = 1; i <= limit; i++) {
        if (cancelled) return;
        try {
          const p = await pdf.getPage(i);
          const v1 = p.getViewport({ scale: 1 });
          const scale = 320 / v1.width;
          const vp = p.getViewport({ scale });
          const c = document.createElement('canvas');
          c.width = vp.width; c.height = vp.height;
          const ctx = c.getContext('2d');
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, c.width, c.height);
          await p.render({ canvasContext: ctx, viewport: vp }).promise;
          const url = c.toDataURL('image/jpeg', 0.78);
          out.push({ n: i, url });
          if (!cancelled) setPages([...out]);
        } catch (e) {}
      }
      __pdfPagesCache[src] = out;
      if (!cancelled) setLoading(false);
    }).catch(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  }, [src]);

  return (
    <div className="pdf-pages-grid" style={{ gridTemplateColumns: `repeat(${cols},1fr)` }}>
      {pages.map((p) =>
        <div key={p.n} className="pdf-page-card" onClick={() => onClickPage && onClickPage(p.n)}>
          <div className="pdf-page-card-img"><img src={p.url} alt={`Página ${p.n}`} /></div>
          <span className="pdf-page-card-n">Página {String(p.n).padStart(2,'0')}</span>
        </div>
      )}
      {loading && Array.from({ length: Math.max(0, 8 - pages.length) }).map((_, i) =>
        <div key={'sk'+i} className="pdf-page-card pdf-page-card-skel"><div className="pdf-page-card-img"></div><span className="pdf-page-card-n">···</span></div>
      )}
    </div>
  );
}

// Real PDF reader — uses PDF.js to render pages as canvases (no browser PDF chrome)
function PdfReader({ src, cover, altVersion, onToggleVersion, hasAlt, skipPages, coverAlone }) {
  // Fallback para file:// — el visor nativo del navegador SÍ funciona en local.
  if (window.__IS_FILE_PROTOCOL) {
    return (
      <div className="pdf-reader">
        <div className="pdf-stage" style={{ padding: 0, cursor: 'default' }}>
          <iframe
            src={src}
            style={{ width:'100%', height:'100%', border:'none', background:'#1a1a1a' }}
            title="PDF"
          />
        </div>
        <div className="pdf-controls">
          <div className="pdf-info" style={{ opacity:.7 }}>Visor local · {src.split('/').pop()}</div>
          <a href={src} target="_blank" rel="noopener" style={{
            background:'transparent', color:'var(--paper)', border:'1px solid rgba(244,242,236,.55)',
            padding:'9px 16px', fontFamily:"'JetBrains Mono',monospace", fontSize:11,
            letterSpacing:'.2em', textTransform:'uppercase', textDecoration:'none'
          }}>Abrir en pestaña ↗</a>
        </div>
      </div>
    );
  }

  const skip = React.useMemo(() => new Set(skipPages || []), [skipPages]);
  const skipNext = (p, total) => { let n = p; while (n <= total && skip.has(n)) n++; return n; };
  const skipPrev = (p) => { let n = p; while (n >= 1 && skip.has(n)) n--; return n; };
  const [pdf, setPdf] = useState(null);
  const [page, setPage] = useState(1);
  const [mode, setMode] = useState('single'); // 'single' | 'spread' — single page por defecto, opt-in al spread
  const [zoomed, setZoomed] = useState(false);
  const [err, setErr] = useState(false);
  const canvasRefs = useRef({ left: null, right: null });

  useEffect(() => {
    let cancelled = false;
    setPdf(null);setPage(1);setErr(false);
    if (!window.pdfjsLib) {setErr(true);return;}
    pdfjsLib.getDocument(src).promise.then((d) => {
      if (!cancelled) setPdf(d);
    }).catch(() => {if (!cancelled) setErr(true);});
    return () => {cancelled = true;};
  }, [src]);

  // Spread mode. Si coverAlone, la página 1 es la tapa sola y después se emparejan
  // (2-3),(4-5)… como un libro/revista real. Si no, pares directos (1-2),(3-4)…
  const showRight = mode === 'spread' && pdf && !(coverAlone && page === 1) && page + 1 <= pdf.numPages;
  const totalPages = pdf ? pdf.numPages : 0;
  const stepNext = (p) => {
    let n;
    if (mode === 'spread') {
      if (coverAlone && p === 1) n = 2;
      else n = Math.min(totalPages, p + 2);
    } else n = Math.min(totalPages, p + 1);
    while (n <= totalPages && skip.has(n)) n++;
    if (n > totalPages) n = p;
    return n;
  };
  const stepPrev = (p) => {
    let n;
    if (mode === 'spread') {
      if (coverAlone && p === 2) n = 1;
      else n = Math.max(1, p - 2);
    } else n = Math.max(1, p - 1);
    while (n >= 2 && skip.has(n)) n--;
    if (n === 1 && skip.has(1)) { let x = 1; while (x <= totalPages && skip.has(x)) x++; n = x; }
    return n;
  };

  // Render current page(s)
  useEffect(() => {
    if (!pdf) return;
    let cancelled = false;
    const tasks = [];
    const renderPage = async (pageNum, canvas) => {
      if (!canvas || pageNum < 1 || pageNum > pdf.numPages) return;
      const p = await pdf.getPage(pageNum);
      if (cancelled) return;
      const v1 = p.getViewport({ scale: 1 });
      // En mobile bajamos la resolución para no agotar la memoria del canvas (PDFs grandes
      // como los pressbooks de 9 Reinas / Koizone hacían fallar el render en celulares).
      const isMobile = (typeof window !== 'undefined' && window.innerWidth <= 980);
      const target = isMobile ? 820 : 1400;
      const scale = target / v1.width;
      const vp = p.getViewport({ scale });
      canvas.width = vp.width;
      canvas.height = vp.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const task = p.render({ canvasContext: ctx, viewport: vp });
      tasks.push(task);
      await task.promise;
      // Liberar los recursos decodificados de la página (las imágenes de imprenta de
      // 9–17 megapíxeles) apenas se pintó, para no acumular memoria al pasar páginas.
      // Clave en iOS Safari, donde si no se agota la memoria y cierra la pestaña.
      try { p.cleanup(); } catch (e) {}
    };
    (async () => {
      try {
        await renderPage(page, canvasRefs.current.left);
        if (showRight) await renderPage(page + 1, canvasRefs.current.right);
      } catch (e) {
        // Errores de render (cancelaciones, carreras al navegar rápido o al entrar a
        // modo Libro) son transitorios — NO disparan el fallback. El fallback al visor
        // nativo solo ocurre si falla la CARGA del documento (ver getDocument abajo).
      }
    })();
    return () => {
      cancelled = true;
      // Cancelar renders en curso para que no choquen con el siguiente
      tasks.forEach((t) => { try { t.cancel(); } catch (e) {} });
    };
  }, [pdf, page, mode, showRight]);

  // Keyboard nav
  useEffect(() => {
    if (!pdf) return;
    const fn = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowLeft') { e.preventDefault(); setPage((p) => stepPrev(p)); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); setPage((p) => stepNext(p)); }
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [pdf, mode, skip, coverAlone]);

  if (err) {
    // pdf.js no pudo cargar/renderizar (común en mobile con PDFs grandes o si el worker
    // del CDN no carga). Fallback al visor nativo del navegador, que es mucho más liviano.
    return (
      <div className="pdf-reader">
        <div className="pdf-stage" style={{ padding: 0, cursor: 'default' }}>
          <iframe
            src={src}
            style={{ width:'100%', height:'100%', border:'none', background:'#1a1a1a' }}
            title="PDF"
          />
        </div>
        <div className="pdf-controls">
          <div className="pdf-info" style={{ opacity:.7 }}>{src.split('/').pop()}</div>
          <a href={src} target="_blank" rel="noopener" style={{
            background:'transparent', color:'var(--paper)', border:'1px solid rgba(244,242,236,.55)',
            padding:'9px 16px', fontFamily:"'JetBrains Mono',monospace", fontSize:11,
            letterSpacing:'.2em', textTransform:'uppercase', textDecoration:'none'
          }}>Abrir en pestaña ↗</a>
        </div>
      </div>);

  }

  if (!pdf) {
    return (
      <div className="pdf-reader">
        <div className="pdf-stage">
          {cover && <img src={cover} alt="" style={{ maxHeight: 'calc(92vh - 110px)', maxWidth: '100%', objectFit: 'contain', opacity: .55 }} />}
          <div className="pdf-loading">Cargando documento</div>
        </div>
      </div>);

  }

  const total = pdf.numPages;
  // Visible counts (excluding skipped pages)
  const visibleTotal = total - Array.from(skip).filter(n => n >= 1 && n <= total).length;
  // Visible index for current page
  let visibleIdx = 0;
  for (let i = 1; i <= page; i++) if (!skip.has(i)) visibleIdx++;
  const label = showRight ? `${visibleIdx}–${visibleIdx + 1}` : `${visibleIdx}`;
  const goPrev = () => setPage((p) => stepPrev(p));
  const goNext = () => setPage((p) => stepNext(p));
  const atStart = page === 1 || visibleIdx === 1;
  const atEnd = visibleIdx >= visibleTotal;

  return (
    <div className={`pdf-reader ${zoomed ? 'zoomed' : ''}`}>
      <div className="pdf-stage" onClick={(e) => {
        if (zoomed) return; // when zoomed, allow scrolling instead of paging
        // Click left half → prev, right half → next
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX - rect.left;
        if (x < rect.width / 2) {if (!atStart) goPrev();} else
        {if (!atEnd) goNext();}
      }}>
        <div className={`pdf-page-wrap ${showRight ? 'is-spread' : ''}`}>
          <canvas
            ref={(el) => canvasRefs.current.left = el}
            className={`pdf-canvas ${altVersion ? 'alt-yellow' : ''}`}
            onClick={(e) => {
              e.stopPropagation();
              if (zoomed) return;
              if (showRight) {
                // spread mode — clicking left canvas = previous spread
                if (!atStart) goPrev();
              } else {
                // single page — split the canvas in half
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                if (x < rect.width / 2) { if (!atStart) goPrev(); }
                else { if (!atEnd) goNext(); }
              }
            }}
          />
          {showRight && <canvas
            ref={(el) => canvasRefs.current.right = el}
            className={`pdf-canvas ${altVersion ? 'alt-yellow' : ''}`}
            onClick={(e) => {
              e.stopPropagation();
              if (zoomed) return;
              if (!atEnd) goNext();
            }}
          />}
        </div>
        {!zoomed && <button className="pdf-edge pdf-edge-l" onClick={(e) => {e.stopPropagation();goPrev();}} disabled={atStart} aria-label="Anterior">‹</button>}
        {!zoomed && <button className="pdf-edge pdf-edge-r" onClick={(e) => {e.stopPropagation();goNext();}} disabled={atEnd} aria-label="Siguiente">›</button>}
      </div>
      <div className="pdf-controls">
        <div className="pdf-nav">
          <button disabled={atStart} onClick={goPrev}>← Anterior</button>
          <button disabled={atEnd} onClick={goNext}>Siguiente →</button>
        </div>
        <div className="pdf-info">{label} / {visibleTotal}</div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          {hasAlt &&
            <div className="pdf-version-toggle">
              <button className={!altVersion ? 'on' : ''} onClick={() => onToggleVersion && onToggleVersion(false)}>Normal</button>
              <button className={altVersion ? 'on' : ''} onClick={() => onToggleVersion && onToggleVersion(true)}>Alt</button>
            </div>
          }
          <button className={`pdf-zoom-btn ${zoomed ? 'on' : ''}`} onClick={() => setZoomed(z => !z)}>{zoomed ? '− Zoom' : '+ Zoom'}</button>
          {total > 1 &&
          <div className="pdf-mode">
              <button className={mode === 'single' ? 'on' : ''} onClick={() => {setMode('single');}}>Página</button>
              <button className={mode === 'spread' ? 'on' : ''} onClick={() => {setMode('spread');setPage(coverAlone ? 2 : 1);}}>Libro</button>
            </div>
          }
        </div>
      </div>
    </div>);

}

function AssetView({ asset, onEnded, altVersion, onToggleVersion, hasAlt }) {
  const [muted, setMuted] = React.useState(true);
  const videoRef = React.useRef(null);
  React.useEffect(() => {setMuted(true);}, [asset && asset.src]);
  if (!asset) return null;
  if (asset.type === 'img') return <img src={asset.src} alt={asset.label} />;
  if (asset.type === 'pdf') return <PdfReader key={asset.src} src={asset.src} cover={asset.cover} altVersion={altVersion} onToggleVersion={onToggleVersion} hasAlt={hasAlt} skipPages={asset.skipPages} coverAlone={asset.coverAlone} />;
  if (asset.type === 'video') {
    return (
      <div className="av-video">
        <video
          ref={videoRef}
          key={asset.src}
          src={asset.src}
          controls
          autoPlay
          muted={muted}
          playsInline
          preload="metadata"
          onEnded={onEnded} />
        
        {asset.hasSound &&
        <button
          className={`av-mute ${muted ? 'is-muted' : 'is-on'}`}
          onClick={(e) => {

      </div>);

  return null;

// AnimatedCover — cycles through a list of videos automatically, with optional unmute toggle
function AnimatedCover({ assets, projectName }) {
  const [bad, setBad] = React.useState(new Set());
  // Filter out broken videos
  const goodAssets = React.useMemo(() => assets.filter(a => !bad.has(a.src)), [assets, bad]);
  const [i, setI] = React.useState(0);
  const [muted, setMuted] = React.useState(true);
  const vRef = React.useRef(null);
  const a = goodAssets[i % Math.max(1, goodAssets.length)];
  const total = goodAssets.length;

  React.useEffect(() => {
    // Always force muted on switch unless user toggled
    if (vRef.current) {
      vRef.current.muted = muted;
      const p = vRef.current.play();
      if (p && p.catch) p.catch(() => {});
    }
  }, [i, a && a.src]);

  if (!a) return <div className="anim-cover" style={{display:'flex',alignItems:'center',justifyContent:'center',color:'#666',fontFamily:'JetBrains Mono,monospace',fontSize:11,letterSpacing:'.2em',textTransform:'uppercase'}}>Sin video disponible</div>;
  return (
    <div className="anim-cover" onClick={(e) => {/* allow click-through to project */}}>
      <video
        ref={vRef}
        key={a.src}
        src={a.src}
        muted={muted}
        autoPlay
        playsInline
        preload="metadata"
        onEnded={() => setI((x) => (x + 1) % Math.max(1,total))}
        onError={() => {
          setBad((s) => { const n = new Set(s); n.add(a.src); return n; });
        }} />
      
      <div className="anim-cover-overlay">
        <span className="anim-cover-i">{String((i%total)+1).padStart(2, '0')} / {String(total).padStart(2, '0')}</span>
        <span className="anim-cover-t">{a.label}</span>
      </div>
      {a.hasSound &&
      <button
        className={`av-mute anim-cover-mute ${muted ? 'is-muted' : 'is-on'}`}
        onClick={(e) => {
          e.stopPropagation();
          const next = !muted;
          setMuted(next);
          if (vRef.current) vRef.current.muted = next;
        }}
        aria-label={muted ? 'Activar sonido' : 'Silenciar'}>
        
          {muted ? <><span className="av-mute-ico">🔇</span><span className="av-mute-l">Activar sonido</span></> :
        <><span className="av-mute-ico">🔊</span><span className="av-mute-l">Silenciar</span></>}
        </button>
      }
    </div>);

}

          <img src={p.cover} alt={p.name} loading="lazy" />
          <div className="pj-spider-simple-cta">
            <span className="pj-spider-simple-cta-eyebrow">↳ Tocá la portada</span>
            <span className="pj-spider-simple-cta-l">Abrir lector editorial</span>
            <span className="pj-spider-simple-cta-arr">→</span>
          </div>
        </div>
      </article>);
  };

  // ── Special card: Gorillaz — Original / Alternativa toggle (4 assets reales) ──
  const renderGorillazCard = (p, num, totalStr) => {
    const openAt = (label) => {
      const idx = p.assets.findIndex((a) => a.label === label);
      onOpenProject(p, Math.max(0, idx));
    };
    return (
      <GorillazSimple key={p.id} p={p} num={num} totalStr={totalStr}
        lang={lang}
        onOpen={() => onOpenProject(p, 0)}
        onOpenAt={openAt} />
    );
  };

  // ── Special card: Koizone — flipbook button + mockup grid ──
  const renderKoizoneCard = (p, num, totalStr) => {
    const pdf = p.assets.find((a) => a.type === 'pdf');
    const pdfIdx = pdf ? p.assets.indexOf(pdf) : 0;
    // Group remaining assets by section
    const mockups = p.assets.filter((a) => a.section === 'Mockups');
    const sistema = p.assets.filter((a) => a.section === 'Sistema editorial');
    return (
      <article key={p.id} className="pj-koizone">
        <header className="pj-koizone-head">
          <div className="pj-koizone-head-l">
            <span className="pj-koizone-meta">{num} / {totalStr} · <b>Editorial · Revista</b> · {p.year}</span>
            <h3 className="pj-koizone-name">{p.name}</h3>
            <p className="pj-koizone-desc">{p.desc[lang]}</p>
          </div>
        </header>
        <div className="pj-koizone-stage">
          {/* Big "Abrir revista" — flipbook entry */}
          <button type="button" className="pj-koizone-flip" onClick={(e) => { e.stopPropagation(); onOpenProject(p, pdfIdx); }}>
            <div className="pj-koizone-flip-cover">
              {pdf && <PdfThumb src={pdf.src} fallback="design/koizone-cover.jpg" alt="Koizone" />}
            </div>
            <div className="pj-koizone-flip-cta">
              <span className="eye">01 / Revista</span>
              <span className="l">Abrir revista (flipbook)</span>
              <span className="arr">→</span>
            </div>
          </button>
          {/* Side: mockups + sistema in two stacked groups */}
          <aside className="pj-koizone-side">
            <header className="pj-koizone-side-h">
              <span className="n">02</span>
              <h4>Mockups + serie</h4>
            </header>
            <div className="pj-koizone-grid">
              {mockups.map((a) => {
                const idx = p.assets.indexOf(a);
                return (
                  <button key={a.src} type="button" className="pj-koizone-tile"
                          onClick={(e) => { e.stopPropagation(); onOpenProject(p, idx); }}>
                    <div className="pj-koizone-tile-img"><img src={a.src} alt={a.label} loading="lazy" /></div>
                    <span className="pj-koizone-tile-l">{a.label}</span>
                  </button>
                );
              })}
            </div>
            <header className="pj-koizone-side-h">
              <span className="n">03</span>
              <h4>Sistema editorial</h4>
            </header>
            <div className="pj-koizone-grid">
              {sistema.map((a) => {
                const idx = p.assets.indexOf(a);
                return (
                  <button key={a.src} type="button" className="pj-koizone-tile"
                          onClick={(e) => { e.stopPropagation(); onOpenProject(p, idx); }}>
                    <div className="pj-koizone-tile-img"><img src={a.src} alt={a.label} loading="lazy" /></div>
                    <span className="pj-koizone-tile-l">{a.label}</span>
                  </button>
                );
              })}
            </div>
          </aside>
        </div>
      </article>);
  };

  // ── Special card: Nueve Reinas — afiche grande + vertical list con covers (Tesis-style) ──
  const render9RCard = (p, num, totalStr) => {
    const sectionMap = [
      { name: 'Concepto',        cover: 'design/9r-concepto-portada.jpg', sub: 'Documento de concepto del sistema' },
      { name: 'Pressbook',       cover: 'design/9r-pressbook-portada.png', sub: '3 ediciones editoriales · 36 págs c/u' },
      { name: 'Cartas',          cover: 'design/9r-cartas-portada.png',    sub: 'Baraja completa · dorso · mockups' },
      { name: 'Caja de truco',   cover: 'design/9r-caja-portada.png',      sub: 'Packaging troquelado · escena' },
      { name: 'Entradas / DNI',  cover: 'design/9r-dni-exterior.png',      sub: 'Pieza inmersiva · ticket de cine + souvenir doble cara' },
    ];
    const counts = {};
    p.assets.forEach((a) => { const k = a.section || ''; counts[k] = (counts[k]||0)+1; });
    const sectionFirstIdx = (sec) => p.assets.findIndex((a) => a.section === sec);
    const afichePdf = (p.heroAfiche || '').startsWith('PDF:') ? p.heroAfiche.slice(4) : null;
    // Pressbook sub-items (3 PDFs)
    const pressbooks = p.assets.filter((a) => a.section === 'Pressbook');
    return (
      <article key={p.id} className="pj-9r">
        <header className="pj-9r-head">
          <div className="pj-9r-head-l">
            <span className="pj-9r-meta">{num} / {totalStr} · <b>Editorial · Pressbooks + packaging</b> · {p.year}</span>
            <h3 className="pj-9r-name">{p.name}</h3>
            <p className="pj-9r-desc">{p.desc[lang]}</p>
          </div>
        </header>
        <div className="pj-9r-stage">
          {/* AFICHE GRANDE — con outline negro */}
          <div className="pj-9r-afiche" onClick={(e) => { e.stopPropagation(); onOpenProject(p, Math.max(0, sectionFirstIdx('Afiches'))); }}>
            <span className="pj-9r-afiche-tag">Afiche principal</span>
            {afichePdf
              ? <PdfThumb src={afichePdf} fallback="design/9r-afiche-cover.jpg" alt="Afiche" />
              : <img src="design/9r-afiche-cover.jpg" alt="Afiche" />}
          </div>
          {/* LISTA VERTICAL — Tesis-style */}
          <div className="pj-9r-list">
            {/* Group A — Concepto */}
            {(() => {
              const conceptoIdx = sectionFirstIdx('Concepto');
              if (conceptoIdx < 0) return null;
              const concepto = sectionMap[0];
              return (
                <div className="pj-9r-list-group">
                  <header className="pj-9r-list-group-h">
                    <span className="pj-9r-list-group-num">A</span>
                    <span><b>Concepto</b> · documento del sistema</span>
                  </header>
                  <button type="button" className="pj-9r-row"
                          onClick={(e) => { e.stopPropagation(); onOpenProject(p, conceptoIdx); }}>
                    <div className="pj-9r-row-img">
                      <img src={concepto.cover} alt={concepto.name} loading="lazy" />
                    </div>
                    <div className="pj-9r-row-body">
                      <span className="pj-9r-row-num">A · 01</span>
                      <h4 className="pj-9r-row-h">{concepto.name}</h4>
                      <span className="pj-9r-row-sub">{concepto.sub}</span>
                    </div>
                    <span className="pj-9r-row-arr">→</span>
                  </button>
                </div>
              );
            })()}
            {/* Group B — Pressbook */}
            {pressbooks.length > 0 &&
              <div className="pj-9r-list-group">
                <header className="pj-9r-list-group-h">
                  <span className="pj-9r-list-group-num">B</span>
                  <span><b>Pressbook</b> · {pressbooks.length} ediciones</span>
                </header>
                {pressbooks.map((pb, i) => {
                  const idx = p.assets.indexOf(pb);
                  return (
                    <button key={pb.src} type="button" className="pj-9r-row"
                            onClick={(e) => { e.stopPropagation(); onOpenProject(p, idx); }}>
                      <div className="pj-9r-row-img">
                        <img src={pb.cover || 'design/9r-pressbook-portada.png'} alt={pb.label} loading="lazy" />
                      </div>
                      <div className="pj-9r-row-body">
                        <span className="pj-9r-row-num">B · {String(i+1).padStart(2,'0')}</span>
                        <h4 className="pj-9r-row-h">Pressbook {String(i+1).padStart(2,'0')}</h4>
                        <span className="pj-9r-row-sub">Mini-revista editorial</span>
                      </div>
                      <span className="pj-9r-row-arr">→</span>
                    </button>
                  );
                })}
              </div>
            }
            {/* Group C — Sistema material (Cartas + Caja + Entradas/DNI) */}
            <div className="pj-9r-list-group">
              <header className="pj-9r-list-group-h">
                <span className="pj-9r-list-group-num">C</span>
                <span><b>Sistema material</b> · packaging + cartas + entradas</span>
              </header>
              {sectionMap.slice(2).map((sm, i) => {
                const startIdx = sectionFirstIdx(sm.name);
                if (startIdx < 0) return null;
                return (
                  <button key={sm.name} type="button" className="pj-9r-row"
                          onClick={(e) => { e.stopPropagation(); onOpenProject(p, startIdx); }}>
                    <div className="pj-9r-row-img">
                      <img src={sm.cover} alt={sm.name} loading="lazy" />
                    </div>
                    <div className="pj-9r-row-body">
                      <span className="pj-9r-row-num">C · {String(i+1).padStart(2,'0')}</span>
                      <h4 className="pj-9r-row-h">{sm.name}</h4>
                      <span className="pj-9r-row-sub">{sm.sub}</span>
                    </div>
                    <span className="pj-9r-row-arr">→</span>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </article>);
  };

  // ── Special card: 3D feature (Auto Retrofuturista — own hero card) ──
  const render3DCard = (p, num, totalStr) => {
    const heroImg = p.assets.find((a) => a.type === 'img');
    const videos = p.assets.filter((a) => a.type === 'video');
    return (
      <article key={p.id} className="pj-3d" onClick={() => onOpenProject(p)}>
        <div className="pj-3d-head">
          <span className="pj-num">{num} / {totalStr} — {p.year}</span>
          <h3 className="pj-3d-section-h">3D · Auto Retrofuturista</h3>
          <span className="pj-posters-tag">Pieza destacada</span>
        </div>
        <div className="pj-3d-hero">
          {heroImg && <img src={heroImg.src} alt={heroImg.label} loading="lazy" />}
          <div className="pj-3d-hero-label">
            <span className="se-eyebrow" style={{ color: 'rgba(244,242,236,.7)' }}>Pieza principal · 3D / Modelado</span>
            <h3 className="pj-3d-main-h">{p.name}</h3>
            <span className="pj-3d-main-meta">{p.role}</span>
          </div>
          {videos.length > 0 &&
          <span className="pj-3d-anim-pill">▶ {videos.length} animaciones</span>
          }
        </div>
        <div className="pj-3d-foot">
          <p className="pj-3d-desc">{p.desc[lang]}</p>
          <div className="pj-3d-meta">
            <span><b>Blender</b></span>
            <span>·</span>
            <span><b>{p.assets.length}</b> piezas</span>
            <span>·</span>
            <span>{p.year}</span>
            <span className="pj-link" style={{ marginLeft: 'auto' }}>{t.viewProject} →</span>
          </div>
        </div>
      </article>);

  };

  return (
    <section id="design" className="sec">
      <div className="wrap">
        <div className="sec-head">
          <span className="sec-num">{t.num}</span>
          <div>
            <h2 className="sec-title">{t.title}.</h2>
            <p className="sec-meta">{t.meta}</p>
          </div>
        </div>

        <div className="illu-bar">
          <div className="filters">
            {cats.map((c) =>
            <button key={c.id} className={`chip ${filter === c.id ? 'on' : ''}`} onClick={() => setFilter(c.id)}>
                {c.label} <span className="n">({c.n})</span>
              </button>
            )}
          </div>
          <div className="illu-count">
            {filtered.length} {filtered.length === 1 ? 'proyecto' : 'proyectos'}
          </div>
        </div>

        <div className="projects-list">
          {filtered.map((p, idx) => {
            const isVid = p.cover && p.cover.endsWith('.mp4');
            const isPdfCover = p.cover && p.cover.startsWith('PDF:');
            const flip = idx % 2 === 1;
            const num = String(idx + 1).padStart(2, '0');
            const totalStr = String(filtered.length).padStart(2, '0');
            const prev = idx > 0 ? filtered[idx - 1] : null;
            const newGroup = p.tag === '3d' && (!prev || prev.tag !== '3d');

            const banner = newGroup ? (
              <header className="pj-group-banner pj-group-3d">
                <div className="pj-group-eyebrow">↳ Sección</div>
                <h3 className="pj-group-title">3D / Modelado</h3>
                <p className="pj-group-sub">Blender · 3D Modeling — Auto retrofuturista + Spider-Man Room (High &amp; Low Poly)</p>
                <span className="pj-group-meta">{filtered.filter(x => x.tag === '3d').length} proyectos</span>
              </header>
            ) : null;

            // Special renders
            if (p.featureTesis) return (<React.Fragment key={p.id}>{renderTesisCard(p, num, totalStr)}</React.Fragment>);
            if (p.featureSpider) return renderSpiderCard(p, num, totalStr);
            if (p.featureGorillaz) return renderGorillazCard(p, num, totalStr);
            if (p.feature9R) return render9RCard(p, num, totalStr);
            if (p.featureKoizone) return renderKoizoneCard(p, num, totalStr);
            if (p.tag === 'posters') return renderPostersCard(p, num, totalStr);
            if (p.feature3d) return (<React.Fragment key={p.id}>{banner}{render3DCard(p, num, totalStr)}</React.Fragment>);

            return (
              <React.Fragment key={p.id}>
              {banner}
              <article
                className={`pj ${flip ? 'flip' : ''}`}
                onClick={() => onOpenProject(p)}>
                <div className="pj-img">
                  {p.autoRotate && p.assets && p.assets.some((a) => a.type === 'video') ?
                  <AnimatedCover assets={p.assets.filter((a) => a.type === 'video')} projectName={p.name} /> :
                  isVid ?
                  <video src={p.cover} muted loop autoPlay playsInline preload="metadata" /> :
                  isPdfCover ?
                  <PdfThumb src={p.cover.slice(4)} fallback="" alt={p.name} /> :
                  <img src={p.cover} alt={p.name} loading="lazy" />}
                </div>
                <div className="pj-info">
                  <div className="pj-num">{num} / {totalStr} — {p.year}</div>
                  <h3 className="pj-name">{p.name}</h3>
                  <div className="pj-meta">
                    <div className="pj-meta-row"><span>{t.cat}</span><b>{p.cat}</b></div>
                    <div className="pj-meta-row"><span>{t.role}</span><b style={{ textTransform: 'none', letterSpacing: '.02em', fontFamily: 'Poppins,sans-serif', fontSize: 13 }}>{p.role}</b></div>
                    {p.assets && p.assets.length > 0 &&
                    <div className="pj-meta-row"><span>{t.pieces}</span><b>{p.assets.length}</b></div>
                    }
                  </div>
                  <span className="pj-link">{t.viewProject} →</span>
                </div>
              </article>
              </React.Fragment>);

          })}
        </div>
        {/* CTA cruzada → Ilustración */}
        <button type="button" className="section-jump section-jump-illu" onClick={() => onSwitchView && onSwitchView('illu')}>
          <span className="section-jump-k">02 / Sección · Siguiente</span>
          <span className="section-jump-title">Ilustración</span>
          <span className="section-jump-meta">{ti.meta} <span className="section-jump-arr">→</span></span>
        </button>
      </div>
    </section>);

}

function IlluSection({ lang, onOpenWork, onReadComic, onSwitchView }) {
  const t = I18N[lang].illu;
  const td = I18N[lang].design;
  const tc = I18N[lang].comic;

  const bySeries = React.useMemo(() => {
    const map = {};
    WORKS.forEach((w) => {
      const s = w.series || 'singles';
      if (!map[s]) map[s] = [];
      map[s].push(w);
    });
    return map;
  }, []);

  const idxOf = (w) => WORKS.findIndex((x) => x.id === w.id);

  const SERIES = [
  { id: 'fashion', title: 'Fashion Atus', sub: 'Moda · Outfits', count: (bySeries.fashion || []).length },
  { id: 'huh', title: 'HUH', sub: 'B/N · Pincel', count: (bySeries.huh || []).length },
  { id: 'comic', title: 'GERO', sub: 'Cómic', count: COMIC.length },
  { id: 'singles', title: 'Atus en escena', sub: 'Piezas sueltas', count: (bySeries.singles || []).length },
  { id: 'movement', title: 'Atus Go', sub: 'Movimiento', count: (bySeries.movement || []).length },
  { id: 'hero-mix', title: 'Héroes & Anime', sub: 'Spider · Marvel · Manga', count: (bySeries.spider || []).length + (bySeries.heroes || []).length + (bySeries.anime || []).length },
  { id: 'rock', title: 'Atus Rock', sub: 'Música', count: (bySeries.rock || []).length },
  { id: 'shorts', title: 'Series cortas', sub: 'Rivalry · Nueve Reinas · Guts · Old', count: (bySeries.rivalry || []).length + (bySeries.guts || []).length + (bySeries.old || []).length + (bySeries.nuevereinas || []).length }];


  const scrollToSeries = (id) => {
    const el = document.getElementById(`s-${id}`);
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 80;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  };

  const Card = ({ w, big }) =>
  <div className={`gcard ${big ? 'gcard-big' : ''}`} onClick={() => onOpenWork(idxOf(w))}>
      <div className={`gcard-img ${w.tone === 'bw' ? 'bw' : ''}`}>
        <img src={w.src} alt={w.title} loading="lazy" />
      </div>
      <div className="gcard-cap">
        <span className="t">{w.title}</span>
        <span className="y">'{w.year.slice(2)}</span>
      </div>
    </div>;


  const SeriesHead = ({ sid, num, title, sub, count }) =>
  <header className="se-head">
      <div className="se-head-l">
        <span className="se-sid">{num} / {sid}</span>
        <h3 className="se-title">{title}</h3>
        {sub && <span className="se-sub">{sub}</span>}
      </div>
      <span className="se-count">{count} {count === 1 ? 'pieza' : 'piezas'}</span>
    </header>;


  const spider = bySeries.spider || [];
  const heroes = bySeries.heroes || [];
  const anime = bySeries.anime || [];
  const rivalry = bySeries.rivalry || [];
  const guts = bySeries.guts || [];
  const old = bySeries.old || [];
  const nueveReinas = (bySeries.nuevereinas || [])[0];

  // Atus Rock — group by sub
  const rockBy = { Sound: [], Rock: [], Punk: [] };
  (bySeries.rock || []).forEach((w) => {(rockBy[w.sub] || rockBy.Sound).push(w);});

  return (
    <section id="illu" className="sec sec-dark">
      <div className="wrap">
        <div className="sec-head">
          <span className="sec-num">{t.num}</span>
          <div>
            <h2 className="sec-title">{t.title}.</h2>
            <p className="sec-meta">{t.meta}</p>
          </div>
        </div>

        {/* anchor nav */}
        <nav className="illu-anchors">
          {SERIES.map((s) =>
          <button key={s.id} className="anchor-chip" onClick={() => scrollToSeries(s.id)}>
              {s.title} <span className="n">({s.count})</span>
            </button>
          )}
        </nav>

        {/* ── 01 · FASHION ATUS ── rack */}
        <section id="s-fashion" className="se-block">
          <SeriesHead sid="fashion-atus" num="01" title="Fashion Atus" sub="Moda · Outfits · Figura" count={(bySeries.fashion || []).length} />
          <div className="se-grid se-rack">
            {(bySeries.fashion || []).map((w) => <Card key={w.id} w={w} />)}
          </div>
        </section>

        {/* ── 02 · HUH ── staggered bento (B/N) */}
        <section id="s-huh" className="se-block">
          <SeriesHead sid="huh" num="02" title="HUH" sub="Estudios a pincel · Blanco y negro" count={(bySeries.huh || []).length} />
          <div className="se-grid se-huh">
            {(bySeries.huh || []).map((w) => <Card key={w.id} w={w} />)}
          </div>
        </section>

        {/* ── 03 · GERO ── comic spread (no chips inside, action below) */}
        <section id="s-comic" className="se-block">
          <SeriesHead sid="comic" num="03" title="GERO" sub={`Cómic · ${COMIC.length} páginas`} count={COMIC.length} />
          <div className="comic-pages">
            {COMIC.map((p, i) =>
            <div key={p.id} className="cpage" onClick={() => onReadComic(i, 'book')}>
                <img src={p.img} alt={`Gero ${p.n}`} loading="lazy" />
                <span className="cpage-num">{tc.page} {p.n}</span>
              </div>
            )}
          </div>
          <div className="comic-cta">
            <button className="cta cta-onDark" onClick={() => onReadComic(0, 'book')}>{tc.readBook} →</button>
            <button className="cta cta-onDark ghost" onClick={() => onReadComic(0, 'single')}>{tc.readPage} →</button>
          </div>
        </section>

        {/* ── 04 · ATUS EN ESCENA ── horizontal scroll strip */}
        <section id="s-singles" className="se-block">
          <SeriesHead sid="atus-en-escena" num="04" title="Atus en escena" sub="Piezas sueltas — desliza →" count={(bySeries.singles || []).length} />
          <div className="se-scroll" role="region" aria-label="Atus en escena — scroll">
            {(bySeries.singles || []).map((w) =>
            <div key={w.id} className="se-scroll-item" onClick={() => onOpenWork(idxOf(w))}>
                <div className={`gcard-img ${w.tone === 'bw' ? 'bw' : ''}`}>
                  <img src={w.src} alt={w.title} loading="lazy" />
                </div>
                <div className="gcard-cap">
                  <span className="t">{w.title}</span>
                  <span className="y">'{w.year.slice(2)}</span>
                </div>
              </div>
            )}
            <div className="se-scroll-end">
              <span>Fin</span>
              <span className="se-scroll-end-n">{(bySeries.singles || []).length} piezas</span>
            </div>
          </div>
        </section>

        {/* ── 05 · ATUS GO ── triptych */}
        <section id="s-movement" className="se-block">
          <SeriesHead sid="atus-go" num="05" title="Atus Go" sub="Movimiento · Acción · Velocidad" count={(bySeries.movement || []).length} />
          <div className="se-grid se-triptych">
            {(bySeries.movement || []).map((w) => <Card key={w.id} w={w} />)}
