<!-- Builds de PRODUCCIÓN de React: bastante menos memoria/CPU que las dev,
     clave para que iOS Safari no se quede sin memoria. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  /* ───────────────────────────────────────────────────────────────
     BUILD OFFLINE — Los PDFs están embebidos como base64 (en pdfdata/*.js,
     divididos en partes y cargados sólo al abrir cada PDF). Se los pasamos
     directo a pdf.js, así el lector editorial se ve y navega EXACTAMENTE
     igual que online, sin el visor nativo del navegador.
     (Fuentes / React / pdf.js vienen de CDN → requieren internet.) */
  window.__IS_FILE_PROTOCOL = false;            // siempre el lector pdf.js, nunca el <iframe>
  window.__pdfManifestFull = {"pdfs/9r-afiche-final.pdf":["pdfdata/0_0.js"],"pdfs/9r-concepto.pdf":["pdfdata/1_0.js"],"pdfs/9reinas-caja.pdf":["pdfdata/5_0.js"],"pdfs/9reinas-cartas-dorso.pdf":["pdfdata/6_0.js"],"pdfs/9reinas-dni-entradas.pdf":["pdfdata/7_0.js"],"pdfs/9r-pressbook-1.pdf":["pdfdata/2_0.js"],"pdfs/9r-pressbook-2.pdf":["pdfdata/3_0.js"],"pdfs/9r-pressbook-3.pdf":["pdfdata/4_0.js","pdfdata/4_1.js"],"pdfs/koizone-revista.pdf":["pdfdata/8_0.js","pdfdata/8_1.js"],"pdfs/spiderman-arq.pdf":["pdfdata/9_0.js","pdfdata/9_1.js","pdfdata/9_2.js"]};
  /* ONLINE (http/https): dejamos el manifest VACÍO para que pdf.js lea los PDFs
     reales por URL (pdfs/*.pdf) con streaming/range requests — usa MUY poca memoria
     y NO crashea iOS Safari. Antes, decodificar 15–45MB de base64 de golpe disparaba
     el aviso "se recargó porque usaba memoria significativa" → te tiraba a Home, y el
     fallback iframe apuntaba a un PDF inexistente (404).
     OFFLINE (file://): no se puede hacer fetch de file://, así que ahí sí usamos el
     base64 embebido (pdfdata/*.js). */
  window.__pdfManifest = (location.protocol === 'file:') ? window.__pdfManifestFull : {};
  window.__pdfData = {};                          // src -> base64 ensamblado
  window.__pdfParts = {};                          // src -> base64 acumulándose
  window.__pdfPending = {};                        // src -> [resolvers]
  window.__setPdf = function(src, b64){
    window.__pdfData[src] = b64;
    var q = window.__pdfPending[src];
    if (q){ delete window.__pdfPending[src]; q.forEach(function(fn){ fn(); }); }
  };
  window.__loadPdf = function(src){
    return new Promise(function(resolve, reject){
      if (window.__pdfData[src]) { resolve(); return; }
      var q = window.__pdfPending[src] || (window.__pdfPending[src] = []);
      q.push(resolve);
      if (q.length > 1) return;                    // ya se está cargando
      var parts = window.__pdfManifest[src] || [];
      window.__pdfParts[src] = '';
      var i = 0;
      (function next(){
        if (i >= parts.length){ window.__setPdf(src, window.__pdfParts[src]); return; }
        var s = document.createElement('script');
        s.src = parts[i++];
        s.onload = next;
        s.onerror = function(){ reject(new Error('No se pudo cargar parte del PDF: ' + src)); };
        document.head.appendChild(s);
      })();
    });
  };
  window.__b64ToU8 = function(b64){
    var bin = atob(b64), len = bin.length, u8 = new Uint8Array(len);
    for (var i = 0; i < len; i++) u8[i] = bin.charCodeAt(i);
    return u8;
  };
  if (window.pdfjsLib && window.pdfjsLib.getDocument){
    /* En pdf.js v3.11 (UMD) getDocument es un getter de SOLO LECTURA: reasignarlo
       falla en silencio. Por eso envolvemos todo el objeto pdfjsLib en un Proxy
       que intercepta sólo getDocument y delega el resto. window.pdfjsLib sí es
       reasignable, y el código React llama pdfjsLib.getDocument(src) sobre el global. */
    var __real = window.pdfjsLib;
    var __wrappedGet = function(arg){
      var src = (typeof arg === 'string') ? arg : (arg && arg.url);
      if (typeof src === 'string' && window.__pdfManifest[src]){
        var task = { destroy: function(){}, onProgress: null };
        task.promise = (async function(){
          if (!window.__pdfData[src]) await window.__loadPdf(src);
          return __real.getDocument({ data: window.__b64ToU8(window.__pdfData[src]) }).promise;
        })();
        return task;
      }
      return __real.getDocument(arg);
    };
    window.pdfjsLib = new Proxy(__real, {
      get: function(t, p){ return p === 'getDocument' ? __wrappedGet : t[p]; }
    });
  }
</script>

<style>
  :root {
    --black:#0c0c0c; --ink:#111;
    --paper:#f4f2ec; --paper-2:#ebe7dc;
    --line:#0c0c0c;             /* solo para acentos contundentes */
    --rule:rgba(12,12,12,.14);  /* hairline para divisores */
    --rule-soft:rgba(12,12,12,.08);
    --mute:#76746c;
    --max:1320px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  /* overflow-x:clip en html corta cualquier desborde horizontal accidental sin
     romper position:sticky ni el scroll (a diferencia de overflow:hidden). Evita
     que un solo elemento más ancho que la pantalla ensanche TODA la página en
     iOS Safari (margen raro a la derecha / "zoom" / grilla rota). */
  html{scroll-behavior:smooth;overflow-x:clip}
  body{background:var(--paper);color:var(--ink);font-family:'Poppins',sans-serif;overflow-x:clip;max-width:100%;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.55}
  ::selection{background:var(--ink);color:var(--paper)}
  img,canvas,video,iframe{display:block;max-width:100%}
  button{font-family:inherit}

  .wrap{max-width:var(--max);margin:0 auto;padding:0 40px}

  /* NAV — limpio, hairline */
  .nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:18px;padding:14px 40px;background:rgba(12,12,12,.94);backdrop-filter:blur(10px);border-bottom:1px solid rgba(244,242,236,.12);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--paper)}
  .nav-mark{display:flex;align-items:center;cursor:pointer;line-height:0}
  .nav-logo{display:block;height:26px;width:auto;filter:brightness(0) invert(1);transition:opacity .2s}
  .nav-mark:hover .nav-logo{opacity:.75}
  .nav-mid{display:flex;gap:32px;justify-content:center;list-style:none}
  .nav-mid a{color:rgba(244,242,236,.55);text-decoration:none;position:relative;padding:4px 0;font-weight:500;cursor:pointer;transition:color .2s}
  .nav-mid a:hover,.nav-mid a.active{color:var(--paper)}
  .nav-mid a.active::after{content:'';position:absolute;left:0;right:0;bottom:-2px;height:1px;background:var(--paper)}
  .nav-right{display:flex;gap:4px;align-items:center}
  .lang-btn{background:transparent;border:none;padding:6px 6px;font-family:inherit;font-size:11px;letter-spacing:.18em;color:rgba(244,242,236,.55);cursor:pointer;text-transform:uppercase}
  .lang-btn.on{color:var(--paper);font-weight:700}
  .lang-btn:hover{color:var(--paper)}
  .nav-burger{display:none;background:transparent;border:1px solid rgba(244,242,236,.3);width:38px;height:32px;align-items:center;justify-content:center;cursor:pointer}
  .nav-burger span{display:block;width:18px;height:1px;background:var(--paper);position:relative}
  .nav-burger span::before,.nav-burger span::after{content:'';position:absolute;left:0;width:18px;height:1px;background:var(--paper)}
  .nav-burger span::before{top:-5px} .nav-burger span::after{top:5px}

  /* HERO — silencio + tipo */
  .hero{min-height:100vh;padding:80px 0 32px;display:grid;grid-template-rows:auto 1fr auto;gap:16px;border-bottom:1px solid var(--rule)}
  .hero-landing{min-height:100vh;padding:96px 0 0;grid-template-rows:auto auto auto;gap:8px}
  .hero-landing .hero-main{padding:0 40px 6px;justify-content:flex-start}
  .hero .wrap{width:100%}
  .hero-top{display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute)}
  .hero-top b{color:var(--ink);font-weight:600}
  .hero-top .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#3a7d3a;margin-right:8px;vertical-align:middle}
  .hero-main{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;gap:0}
  .hero-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--mute);margin-bottom:48px;text-align:center}
  .hero-logo{display:block;width:auto;height:auto;max-width:min(820px,80vw);max-height:38vh;margin:0;object-fit:contain;mix-blend-mode:multiply;filter:contrast(1.05)}
  .hero-sub{font-family:'Poppins',sans-serif;font-weight:500;font-size:clamp(15px,1.4vw,20px);letter-spacing:-.005em;color:var(--ink);margin-top:14px;line-height:1.2;text-align:center}
  .hero-sub span{color:var(--mute);font-weight:400}
  .hero-tagline{font-family:'Poppins',sans-serif;font-weight:400;font-size:13.5px;color:var(--ink);max-width:540px;margin-top:12px;line-height:1.5;text-wrap:pretty;text-align:center}
  .hero-ctas{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:44px;width:100%;max-width:680px}
  .cta{display:inline-flex;align-items:center;gap:10px;padding:14px 22px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;text-decoration:none;border:1px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;transition:background .2s,color .2s;border-radius:0}
  .cta:hover{background:transparent;color:var(--ink)}
  .cta.ghost{background:transparent;color:var(--ink);border-color:var(--ink)}
  .cta.ghost:hover{background:var(--ink);color:var(--paper)}
  /* HERO — big section CTAs */
  .cta-big{display:flex;flex-direction:column;align-items:flex-start;justify-content:space-between;gap:12px;padding:24px 26px 22px;min-height:138px;background:var(--ink);color:var(--paper);border:1px solid var(--ink);cursor:pointer;text-align:left;text-decoration:none;transition:background .2s,color .2s,transform .2s;font-family:'Poppins',sans-serif}
  .cta-big:hover{background:transparent;color:var(--ink)}
  .cta-big.ghost{background:transparent;color:var(--ink)}
  .cta-big.ghost:hover{background:var(--ink);color:var(--paper)}
  .cta-big .k{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;opacity:.7;font-weight:500;display:flex;justify-content:space-between;width:100%;align-items:baseline}
  .cta-big .l{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(22px,2.6vw,34px);line-height:1;letter-spacing:-.02em;display:flex;align-items:center;gap:14px;width:100%;justify-content:space-between}
  .cta-big .l span:last-child{font-size:18px;font-weight:400}
  /* Mini chip CTAs — Sobre mí / Contacto */
  .hero-mini-ctas{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:14px}
  .mini-cta{display:inline-flex;align-items:center;gap:10px;padding:9px 18px;border:1px solid var(--ink);color:var(--ink);text-decoration:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;transition:background .15s,color .15s;background:transparent}
  .mini-cta:hover{background:var(--ink);color:var(--paper)}
  .mini-cta span{font-family:'Poppins',sans-serif;font-weight:400;letter-spacing:0;font-size:13px;text-transform:none}

  /* Two BIG section cards — landing portals (full-bleed, comparten borde con la pantalla) */
  .hero-section-cards{display:grid;grid-template-columns:1fr 1fr;gap:0;width:100%;max-width:none;margin:0;padding:0}
  .hero-card{appearance:none;cursor:pointer;text-align:left;padding:22px 32px 18px;min-height:180px;display:flex;flex-direction:column;justify-content:space-between;gap:10px;font-family:inherit;transition:background .25s,color .25s,transform .25s;position:relative;border:none}
  /* Diseño Gráfico → claro */
  .hero-card-design{background:var(--paper);color:var(--ink);border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);border-right:1px solid var(--ink)}
  .hero-card-design:hover{background:#f1ede2}
  /* Ilustración → oscuro */
  .hero-card-illu{background:var(--ink);color:var(--paper)}
  .hero-card-illu:hover{background:#1a1a1a}
  .hero-card:hover{transform:none}
  .hero-card-k{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;opacity:.7;font-weight:500}
  .hero-card-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(28px,3.6vw,60px);line-height:.96;letter-spacing:-.035em;display:block;text-wrap:balance;margin-top:auto}
  .hero-card-meta{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;opacity:.7;display:flex;justify-content:space-between;align-items:center;gap:14px;padding-top:14px;border-top:1px solid currentColor}
  .hero-card-design .hero-card-meta{border-top-color:rgba(12,12,12,.18)}
  .hero-card-illu .hero-card-meta{border-top-color:rgba(244,242,236,.2)}
  .hero-card-arr{font-family:'Poppins',sans-serif;font-size:20px;font-weight:400;letter-spacing:0;text-transform:none;opacity:.9;transition:transform .25s}
  .hero-card:hover .hero-card-arr{transform:translateX(8px)}

  /* Section view header — back to home */
  .section-view-bar{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:1px solid var(--rule);padding:14px 40px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);margin-top:64px}
  .section-view-bar.dark{background:#0a0907;border-bottom-color:rgba(244,242,236,.14);color:rgba(244,242,236,.6)}
  .section-view-bar button{appearance:none;background:transparent;border:1px solid currentColor;padding:9px 14px;font-family:inherit;font-size:inherit;letter-spacing:inherit;text-transform:inherit;font-weight:600;color:inherit;cursor:pointer;transition:background .15s,color .15s;display:inline-flex;align-items:center;gap:8px}
  .section-view-bar button:hover{background:currentColor}
  .section-view-bar.dark button:hover{color:#0a0907}
  .section-view-bar:not(.dark) button:hover{color:var(--paper)}
  .section-view-bar button span{display:inline-block}
  .section-view-bar .label-r{font-weight:500}
  .section-view-bar .label-r b{color:var(--ink);font-weight:700}
  .section-view-bar.dark .label-r b{color:#f4f2ec}

  /* SECTION — generoso */
  .sec{padding:120px 0;border-bottom:1px solid var(--rule);position:relative}
  .sec-head{display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:baseline;margin-bottom:80px}
  .sec-num{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--mute);padding-top:14px;align-self:start;white-space:nowrap}
  .sec-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(40px,6vw,84px);line-height:.92;letter-spacing:-.035em;text-transform:none}
  .sec-meta{font-family:'Poppins',sans-serif;font-weight:400;font-size:16px;color:var(--mute);max-width:520px;line-height:1.55;margin-top:24px;text-wrap:pretty}

  /* Cross-section jump CTA — mirrors home cards */
  .section-jump{display:flex;flex-direction:column;justify-content:space-between;gap:14px;text-align:left;text-decoration:none;cursor:pointer;padding:32px 36px 28px;min-height:200px;margin-top:80px;transition:background .25s,color .25s;border:1px solid var(--ink);font-family:inherit;appearance:none;width:100%}
  .section-jump-illu{background:var(--ink);color:var(--paper)}
  .section-jump-illu:hover{background:#1a1a1a}
  .section-jump-design{background:var(--paper);color:var(--ink)}
  .section-jump-design:hover{background:#f1ede2}
  .sec-dark .section-jump-design{background:#f4f2ec;color:#0a0907;border-color:#f4f2ec}
  .sec-dark .section-jump-design:hover{background:#e9e2cf}
  .section-jump-k{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;opacity:.7;font-weight:500}
  .section-jump-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(40px,5.4vw,86px);line-height:.95;letter-spacing:-.035em;display:block;margin-top:auto;text-wrap:balance}
  .section-jump-meta{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;opacity:.75;display:flex;justify-content:space-between;align-items:center;gap:14px;padding-top:14px;border-top:1px solid currentColor}
  .section-jump-arr{font-family:'Poppins',sans-serif;font-size:22px;font-weight:400;letter-spacing:0;text-transform:none;opacity:.9;transition:transform .25s}
  .section-jump:hover .section-jump-arr{transform:translateX(8px)}

  /* PROJECT LIST — editorial, un proyecto por spread */
  .projects-list{display:flex;flex-direction:column;gap:0}
  .pj{display:grid;grid-template-columns:7fr 5fr;gap:64px;align-items:center;padding:80px 0;border-top:1px solid var(--rule);cursor:pointer;position:relative}
  .pj:first-child{border-top:none;padding-top:24px}
  .pj:last-child{padding-bottom:24px}
  .pj.flip{grid-template-columns:5fr 7fr}
  .pj-img{aspect-ratio:4/3;background:#0a0907;overflow:hidden;position:relative;order:1}
  .pj.flip .pj-img{order:2}
  .pj-img img,.pj-img video{width:100%;height:100%;object-fit:contain;background:#0a0907;transition:transform .8s cubic-bezier(.2,.8,.2,1)}
  .pj:hover .pj-img img{transform:scale(1.025)}

  /* Spider-Man Room (low-poly y high-poly) — render 16:9 con fondo gris; evitamos letterbox negro y empatamos fondo */
  .pj-img:has(img[src*="sm-lp-"]),
  .pj-img:has(img[src*="sm-hp-"]){aspect-ratio:16/9;background:#3b3b3b}
  .pj-img img[src*="sm-lp-"],
  .pj-img img[src*="sm-hp-"]{background:#3b3b3b;object-fit:cover;object-position:center}
  /* Spider-Man Room (lp y hp): la portada siempre va en la columna ANCHA, sin importar el flip,
     así low-poly se ve igual de grande que high-poly */
  .pj.flip:has(.pj-img img[src*="sm-lp-"]),
  .pj.flip:has(.pj-img img[src*="sm-hp-"]){grid-template-columns:7fr 5fr}
  .pj.flip:has(.pj-img img[src*="sm-lp-"]) .pj-img,
  .pj.flip:has(.pj-img img[src*="sm-hp-"]) .pj-img{order:1}
  .pj.flip:has(.pj-img img[src*="sm-lp-"]) .pj-info,
  .pj.flip:has(.pj-img img[src*="sm-hp-"]) .pj-info{order:2}
  .pj-info{display:flex;flex-direction:column;gap:18px;order:2;padding:0 8px}
  .pj.flip .pj-info{order:1}
  .pj-num{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--mute)}
  .pj-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(28px,3vw,44px);line-height:1;letter-spacing:-.025em;text-transform:none;color:var(--ink);text-wrap:balance}
  .pj-meta{display:flex;flex-direction:column;gap:10px;padding-top:18px;border-top:1px solid var(--rule);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute)}
  .pj-meta-row{display:grid;grid-template-columns:90px 1fr;gap:18px;align-items:baseline}
  .pj-meta-row b{color:var(--ink);font-weight:600;letter-spacing:.16em}
  .pj-link{margin-top:14px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink);display:inline-flex;align-items:center;gap:8px;width:max-content;border-bottom:1px solid var(--ink);padding-bottom:3px;transition:gap .2s}
  .pj:hover .pj-link{gap:14px}

  /* ILUSTRACION — grid silenciosa */
  .illu-bar{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:48px;padding-bottom:24px;border-bottom:1px solid var(--rule)}
  .filters{display:flex;gap:6px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;flex-wrap:wrap}
  .chip{appearance:none;background:transparent;color:var(--mute);border:1px solid transparent;padding:8px 14px;font-family:inherit;font-size:inherit;letter-spacing:inherit;text-transform:inherit;font-weight:600;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
  .chip:hover{color:var(--ink);border-color:var(--rule)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip.on:hover{background:#1a1a1a;color:var(--paper)}
  .chip .n{opacity:.55;margin-left:6px;font-weight:400}
  .chip.on .n{color:rgba(244,242,236,.7);opacity:1}
  .sec-dark .chip{color:rgba(244,242,236,.55)}
  .sec-dark .chip:hover{color:#f4f2ec;border-color:rgba(244,242,236,.3)}
  .sec-dark .chip.on{background:#f4f2ec;color:#0a0907;border-color:#f4f2ec}
  .sec-dark .chip.on .n{color:rgba(10,9,7,.7)}
  .illu-count{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute)}

  /* ILUSTRACION — anchor chips */
  .illu-anchors{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:24px;margin-bottom:56px;border-bottom:1px solid var(--rule)}
  .anchor-chip{appearance:none;background:transparent;border:1px solid var(--rule);padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);cursor:pointer;transition:background .15s,color .15s,border-color .15s;font-weight:500}
  .anchor-chip:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .anchor-chip .n{margin-left:6px;font-weight:400;opacity:.6}

  /* ILUSTRACION — feature hero */
  .se-feature{display:grid;grid-template-columns:1.35fr 1fr;gap:48px;align-items:stretch;margin-bottom:88px;padding-bottom:80px;border-bottom:1px solid var(--rule);cursor:pointer}
  .se-feature-img{background:#fff;overflow:hidden;aspect-ratio:1;position:relative}
  .se-feature-img img{width:100%;height:100%;object-fit:cover;transition:transform .8s cubic-bezier(.2,.8,.2,1)}
  .se-feature:hover .se-feature-img img{transform:scale(1.025)}
  .se-feature-info{display:flex;flex-direction:column;justify-content:center;gap:22px;padding:0 8px}
  .se-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--mute)}
  .se-feature-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(40px,4.5vw,76px);line-height:.9;letter-spacing:-.03em;text-wrap:balance}
  .se-feature-desc{font-size:16px;line-height:1.55;color:var(--mute);max-width:440px}
  .se-feature-meta{display:flex;gap:32px;padding:16px 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute)}
  .se-feature-meta b{color:var(--ink);font-weight:600;letter-spacing:.16em}
  .se-feature-link{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink);border-bottom:1px solid var(--ink);padding-bottom:3px;width:max-content;transition:gap .2s}

  /* ILUSTRACION — series block + header */
  .se-block{margin-bottom:96px}
  .se-block:last-child{margin-bottom:0}
  .se-head{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap;padding-bottom:18px;margin-bottom:28px;border-bottom:1px solid var(--rule)}
  .se-head-l{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
  .se-sid{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--mute)}
  .se-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(28px,3.4vw,48px);line-height:1;letter-spacing:-.028em}
  .se-sub{font-family:'Poppins',sans-serif;font-size:14px;color:var(--mute)}
  .se-count{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute)}

  /* HUH layout — bento, lead 2×2 */
  .se-huh{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .se-huh > .gcard:first-child{grid-column:span 2;grid-row:span 2}

  /* SPIDER layout — bento, lead 2×2 in 4-col */
  .se-spider{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .se-spider > .gcard:first-child{grid-column:span 2;grid-row:span 2}

  /* row layouts */
  .se-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .se-triptych{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .se-triptych .gcard-img{aspect-ratio:4/5}

  /* FASHION — rack */
  .se-rack{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .se-rack .gcard-img{aspect-ratio:3/4}

  /* SOUND stacked subgroups */
  .se-sound{display:flex;flex-direction:column;gap:0}
  .se-sound-row{display:grid;grid-template-columns:160px 1fr;gap:32px;align-items:start;padding:24px 0;border-top:1px solid var(--rule-soft)}
  .se-sound-row:first-child{border-top:none;padding-top:0}
  .se-sound-label{display:flex;flex-direction:column;gap:6px;padding-top:6px;position:sticky;top:80px}
  .se-sound-h{font-family:'Poppins',sans-serif;font-weight:700;font-size:26px;letter-spacing:-.02em;line-height:1}
  .se-sound-n{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute)}
  .se-sound-pieces{display:grid;gap:16px}
  .se-sound-pieces.c2{grid-template-columns:repeat(2,1fr)}
  .se-sound-pieces.c3{grid-template-columns:repeat(3,1fr)}
  .se-sound-pieces .gcard-img{aspect-ratio:4/5}

  /* HEROES & ANIME — side-by-side */
  .se-mix{display:grid;grid-template-columns:1fr 1.35fr;gap:36px}
  .se-mix-side{display:flex;flex-direction:column;gap:14px}
  .se-mix-h{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink);padding-bottom:10px;border-bottom:1px solid var(--rule-soft);font-weight:700}
  .se-mix-grid{display:grid;gap:14px}
  .se-mix-grid.c3{grid-template-columns:repeat(3,1fr)}
  .se-mix-grid.c4{grid-template-columns:repeat(4,1fr)}
  .se-mix-grid .gcard-img{aspect-ratio:1}

  /* SERIES CORTAS — 3 columns */
  .se-shorts{display:grid;grid-template-columns:1fr 1.4fr 1fr;gap:32px;align-items:start}
  .se-short{display:flex;flex-direction:column;gap:14px}
  .se-short-h{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink);padding-bottom:10px;border-bottom:1px solid var(--rule-soft);font-weight:700}
  .se-short-grid{display:grid;gap:10px}
  .se-short-grid.c2{grid-template-columns:repeat(2,1fr)}
  .se-short-grid.c3{grid-template-columns:repeat(3,1fr)}

  /* SINGLES — masonry-ish 4 col with occasional 2×2 highlight */
  .se-singles{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .se-singles > .gcard:nth-child(7n+4){grid-column:span 2;grid-row:span 2}

  /* CARAS — first piece oversized */
  .se-caras{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:18px;align-items:start}
  .se-caras .gcard-big .gcard-img{aspect-ratio:1}
  .se-caras > .gcard:not(.gcard-big) .gcard-img{aspect-ratio:1}

  /* SINGLES — horizontal scroll strip */
  .se-scroll{display:flex;gap:14px;overflow-x:auto;overflow-y:hidden;padding:4px 4px 24px;scroll-snap-type:x mandatory;scrollbar-width:thin;scrollbar-color:rgba(244,242,236,.3) transparent}
  .se-scroll::-webkit-scrollbar{height:8px}
  .se-scroll::-webkit-scrollbar-track{background:rgba(244,242,236,.05)}
  .se-scroll::-webkit-scrollbar-thumb{background:rgba(244,242,236,.3);border-radius:0}
  .se-scroll-item{flex:0 0 280px;cursor:pointer;display:flex;flex-direction:column;gap:8px;scroll-snap-align:start}
  .se-scroll-item .gcard-img{aspect-ratio:3/4;background:#fff;overflow:hidden}
  .se-scroll-item .gcard-img.bw{background:#fff}
  .se-scroll-item .gcard-img.bw img{filter:grayscale(1) contrast(1.18) brightness(1.06)}
  .se-scroll-item .gcard-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.2,.8,.2,1)}
  .se-scroll-item:hover .gcard-img img{transform:scale(1.03)}
  .se-scroll-item .gcard-cap{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase}
  .se-scroll-end{flex:0 0 200px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 24px;border-left:1px solid rgba(244,242,236,.2);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(244,242,236,.6);gap:8px}
  .se-scroll-end-n{color:rgba(244,242,236,.45);font-size:10px}

  /* ── DARK SECTION (Ilustración) ── */
  .sec-dark{background:#0a0907;color:#f4f2ec;border-bottom-color:rgba(244,242,236,.14);position:relative}
  .sec-dark::before{content:'';position:absolute;top:0;left:0;right:0;height:80px;background:linear-gradient(to bottom,var(--paper) 0,var(--paper) 1px,rgba(12,12,12,0) 1px,rgba(12,12,12,1) 100%);pointer-events:none;z-index:0}
  .sec-dark > .wrap{position:relative;z-index:1}
  .sec-dark .sec-num{color:rgba(244,242,236,.5)}
  .sec-dark .sec-title{color:#f4f2ec}
  .sec-dark .sec-meta{color:rgba(244,242,236,.6)}
  .sec-dark .anchor-chip{border-color:rgba(244,242,236,.22);color:rgba(244,242,236,.65);background:transparent}
  .sec-dark .anchor-chip:hover{background:#f4f2ec;color:#0c0c0c;border-color:#f4f2ec}
  .sec-dark .anchor-chip .n{opacity:.55}
  .sec-dark .illu-anchors{border-bottom-color:rgba(244,242,236,.14)}
  .sec-dark .se-head{border-bottom-color:rgba(244,242,236,.16)}
  .sec-dark .se-sid{color:rgba(244,242,236,.55)}
  .sec-dark .se-title{color:#f4f2ec}
  .sec-dark .se-sub{color:rgba(244,242,236,.55)}
  .sec-dark .se-count{color:rgba(244,242,236,.55)}
  .sec-dark .se-feature{border-bottom-color:rgba(244,242,236,.16)}
  .sec-dark .se-eyebrow{color:rgba(244,242,236,.55)}
  .sec-dark .se-feature-title{color:#f4f2ec}
  .sec-dark .se-feature-desc{color:rgba(244,242,236,.7)}
  .sec-dark .se-feature-meta{border-color:rgba(244,242,236,.16);color:rgba(244,242,236,.55)}
  .sec-dark .se-feature-meta b{color:#f4f2ec}
  .sec-dark .se-feature-link{color:#f4f2ec;border-bottom-color:#f4f2ec}
  .sec-dark .gcard-img,.sec-dark .gcard-img.bw{background:#13110f}
  .sec-dark .gcard-img img{filter:brightness(.92) contrast(1.02) saturate(.95);transition:filter .25s,transform .6s cubic-bezier(.2,.8,.2,1)}
  .sec-dark .gcard:hover .gcard-img img{filter:brightness(1) contrast(1.04) saturate(1)}
  .sec-dark .gcard-img.bw img{filter:grayscale(1) contrast(1.06) brightness(.84)}
  .sec-dark .gcard:hover .gcard-img.bw img{filter:grayscale(1) contrast(1.1) brightness(.92)}
  .sec-dark .gcard-cap{color:rgba(244,242,236,.5);opacity:1}
  .sec-dark .gcard-cap .t{color:rgba(244,242,236,.92)}
  .sec-dark .gcard:hover .gcard-cap{color:rgba(244,242,236,.85)}
  .sec-dark .gcard:hover .gcard-cap .t{color:#f4f2ec}
  /* horizontal scroll + comic in dark */
  .sec-dark .se-scroll-item .gcard-img{background:#13110f}
  .sec-dark .se-scroll-item .gcard-img img{filter:brightness(.92) contrast(1.02) saturate(.95)}
  .sec-dark .se-scroll-item .gcard-img.bw img{filter:grayscale(1) contrast(1.06) brightness(.84)}
  .sec-dark .cpage img{filter:brightness(.94) contrast(1.02)}
  .sec-dark .se-sound-row{border-top-color:rgba(244,242,236,.1)}
  .sec-dark .se-sound-h{color:#f4f2ec}
  .sec-dark .se-sound-n{color:rgba(244,242,236,.55)}
  .sec-dark .se-mix-h,.sec-dark .se-short-h{color:#f4f2ec;border-bottom-color:rgba(244,242,236,.16)}
  .sec-dark .cpage{background:#1a1a1a}
  .sec-dark .cpage-num{color:rgba(244,242,236,.55)}
  .sec-dark .comic-cta{border-top-color:rgba(244,242,236,.16)}
  .cta-onDark{background:#f4f2ec;color:#0c0c0c;border-color:#f4f2ec}
  .cta-onDark:hover{background:transparent;color:#f4f2ec}
  .cta-onDark.ghost{background:transparent;color:#f4f2ec;border-color:#f4f2ec}
  .cta-onDark.ghost:hover{background:#f4f2ec;color:#0c0c0c}

  /* POSTERS — hero protagonista + grid sidebar */
  .pj-posters{display:flex;flex-direction:column;gap:32px;padding:80px 0;border-top:1px solid var(--rule)}
  .pj-posters-head{display:flex;flex-direction:column;gap:14px;max-width:880px}
  .pj-posters-head > div{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute)}
  .pj-posters-num{color:var(--mute)}
  .pj-posters-tag{background:var(--ink);color:var(--paper);padding:5px 10px;font-weight:600}
  .pj-posters-count{color:var(--ink);font-weight:600;border:1px solid var(--ink);padding:5px 10px}
  .pj-posters-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(32px,3.6vw,56px);line-height:1;letter-spacing:-.03em;color:var(--ink);text-wrap:balance;margin:0}
  .pj-posters-desc{font-size:15px;line-height:1.6;color:var(--mute);max-width:720px;text-wrap:pretty}

  .pj-posters-stage{display:grid;grid-template-columns:1.45fr 1fr;gap:18px;align-items:stretch;cursor:pointer}
  .pj-posters-hero{display:flex;flex-direction:column;gap:10px}
  .pj-posters-hero-img{background:#1c1a17;overflow:hidden;display:flex;align-items:center;justify-content:center;flex:1;min-height:520px}
  .pj-posters-hero-img img{width:100%;height:100%;max-height:100%;object-fit:contain;display:block;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
  .pj-posters-stage:hover .pj-posters-hero-img img{transform:scale(1.02)}
  .pj-posters-hero-cap{display:flex;justify-content:space-between;align-items:baseline;gap:18px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);flex-wrap:wrap}
  .pj-posters-hero-i{color:var(--ink);font-weight:700}
  .pj-posters-hero-l{font-family:'Poppins',sans-serif;font-size:14px;letter-spacing:0;text-transform:none;color:var(--ink);font-weight:500}

  .pj-posters-side{display:grid;grid-template-columns:repeat(2,1fr);grid-auto-rows:minmax(180px,1fr);gap:6px}
  .pj-poster-mini{display:flex;flex-direction:column;gap:6px;cursor:pointer;background:transparent;overflow:hidden}
  .pj-poster-mini-img{background:#1c1a17;flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:0;aspect-ratio:3/4}
  .pj-poster-mini-img img{width:100%;height:100%;object-fit:contain;transition:transform .4s cubic-bezier(.2,.8,.2,1)}
  .pj-poster-mini:hover .pj-poster-mini-img img{transform:scale(1.04)}
  .pj-poster-mini-l{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pj-poster-mini:hover .pj-poster-mini-l{color:var(--ink)}
  .pj-posters-foot{display:flex;justify-content:space-between;align-items:center;padding-top:18px;border-top:1px solid var(--rule);gap:18px;flex-wrap:wrap}
  .pj-posters-meta-r{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute)}

  /* ── TESIS — Museo del Agua, modular y editorial ── */
  .pj-tesis{position:relative;display:flex;flex-direction:column;gap:0;padding:80px 0;border-top:1px solid var(--rule);background:var(--paper)}
  .pj-tesis-section{padding:0}
  .pj-tesis-section + .pj-tesis-section{margin-top:24px}

  /* Slug line — compact header */
  .pj-tesis-slug{display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;padding:0 0 22px;margin-bottom:0;border-bottom:1px solid var(--rule);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase}
  .pj-tesis-slug-l{display:flex;align-items:center;gap:14px;flex-wrap:wrap;color:var(--mute)}
  .pj-tesis-slug-l b{color:var(--ink);font-weight:700}
  .pj-tesis-pill{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:var(--paper);padding:6px 11px;font-weight:700;letter-spacing:.22em}
  .pj-tesis-slug-c{font-family:'Poppins',sans-serif;font-size:13px;letter-spacing:0;text-transform:none;color:var(--mute);text-align:left;font-weight:400;line-height:1.4;text-wrap:pretty;max-width:60ch}
  .pj-tesis-slug-c b{color:var(--ink);font-weight:600}
  .pj-tesis-slug-r{display:flex;align-items:center;gap:14px;color:var(--mute);justify-content:flex-end;flex-wrap:wrap;font-size:10.5px}
  .pj-tesis-slug-r b{color:var(--ink);font-weight:700;letter-spacing:.18em}

  /* Hero — más compacto, sin overlay pesado, sin azul */
  .pj-tesis-hero-wrap{padding:36px 0 28px}
  .pj-tesis-hero{position:relative;display:grid;grid-template-columns:1.3fr 1fr;gap:0;background:var(--paper);min-height:420px;cursor:pointer;overflow:hidden;border:1px solid var(--rule)}
  .pj-tesis-hero-img{background:#0a0907;overflow:hidden;position:relative;min-height:420px;display:flex;align-items:center;justify-content:center}
  .pj-tesis-hero-img img{width:100%;height:100%;object-fit:cover;transition:transform .8s cubic-bezier(.2,.8,.2,1)}
  .pj-tesis-hero:hover .pj-tesis-hero-img img{transform:scale(1.02)}
  .pj-tesis-hero-corner,.pj-tesis-hero-corner-r,.pj-tesis-hero-corner-b{display:none}

  .pj-tesis-hero-text{padding:40px 40px;display:flex;flex-direction:column;gap:18px;justify-content:center;background:var(--paper);border-left:1px solid var(--rule);position:relative}
  .pj-tesis-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--mute)}
  .pj-tesis-eyebrow b{color:var(--ink);font-weight:700}
  .pj-tesis-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(32px,3.6vw,52px);line-height:.98;letter-spacing:-.03em;color:var(--ink);text-wrap:balance;margin:0}
  .pj-tesis-name em{font-style:italic;font-weight:700;color:var(--ink)}
  .pj-tesis-sub{font-family:'Poppins',sans-serif;font-weight:400;font-size:14.5px;line-height:1.55;color:var(--ink);max-width:54ch;text-wrap:pretty;margin:0}
  .pj-tesis-concept{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);padding:10px 12px;background:var(--paper-2);border-left:2px solid var(--ink);line-height:1.55;letter-spacing:.06em;text-transform:none;font-family:'Poppins',sans-serif;font-size:13px}
  .pj-tesis-concept b{color:var(--ink);font-weight:700}
  .pj-tesis-meta{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:4px;border-top:1px solid var(--rule)}
  .pj-tesis-meta > div{padding:10px 0;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;border-bottom:1px solid var(--rule)}
  .pj-tesis-meta > div:nth-child(odd){padding-right:14px;border-right:1px solid var(--rule)}
  .pj-tesis-meta > div:nth-child(even){padding-left:14px}
  .pj-tesis-meta .lab{color:var(--mute);display:block;margin-bottom:2px}
  .pj-tesis-meta .val{color:var(--ink);font-weight:600;text-transform:none;letter-spacing:.02em;font-family:'Poppins',sans-serif;font-size:13px}
  .pj-tesis-cta{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:var(--paper);padding:12px 18px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;align-self:flex-start;cursor:pointer;border:1px solid var(--ink);margin-top:4px}
  .pj-tesis-cta:hover{background:transparent;color:var(--ink)}

  /* Banda cinemática — REMOVIDA — la imagen ahora va en el hero */
  .pj-tesis-band{display:none}

  /* Índice modular — tabs + acordeón */
  .pj-tesis-index-wrap{padding:28px 0 0}
  .pj-tesis-index-head{display:flex;align-items:baseline;justify-content:space-between;gap:18px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--rule);flex-wrap:wrap}
  .pj-tesis-index-h1{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(20px,2.2vw,28px);line-height:1;letter-spacing:-.02em;color:var(--ink);margin:0}
  .pj-tesis-index-h1 b{color:var(--ink);font-weight:700}
  .pj-tesis-index-r{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);text-align:right;line-height:1.5}
  .pj-tesis-index-r b{color:var(--ink);font-weight:700}
  .pj-tesis-index-rule{display:none}

  /* Tabs A/B */
  .pj-tesis-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .pj-tesis-tab{appearance:none;background:transparent;border:1px solid var(--rule);color:var(--mute);padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .15s,color .15s,border-color .15s;display:inline-flex;align-items:center;gap:8px}
  .pj-tesis-tab:hover{border-color:var(--ink);color:var(--ink)}
  .pj-tesis-tab.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .pj-tesis-tab .n{opacity:.6;font-weight:400}
  .pj-tesis-tab.on .n{color:rgba(244,242,236,.7);opacity:1}

  .pj-tesis-row-label{display:none}

  /* Acordeón de secciones (sis A, B, C + interior + exterior) */
  .pj-tesis-acc{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--rule)}
  .pj-tesis-acc-item{border-bottom:1px solid var(--rule);background:var(--paper);transition:background .2s,color .2s}
  .pj-tesis-acc-head{display:grid;grid-template-columns:38px 1fr auto auto;gap:16px;align-items:center;padding:22px 16px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink);transition:background .2s,color .2s;margin:0 -16px}
  .pj-tesis-acc-item:not(.open) .pj-tesis-acc-head:hover{background:var(--ink);color:var(--paper)}
  .pj-tesis-acc-item:not(.open) .pj-tesis-acc-head:hover .pj-tesis-acc-num{background:var(--paper);color:var(--ink);border-color:var(--paper)}
  .pj-tesis-acc-item:not(.open) .pj-tesis-acc-head:hover .pj-tesis-acc-s{color:rgba(244,242,236,.7)}
  .pj-tesis-acc-item:not(.open) .pj-tesis-acc-head:hover .pj-tesis-acc-n{color:rgba(244,242,236,.7)}
  .pj-tesis-acc-num{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:transparent;color:var(--ink);border:1px solid var(--ink);font-weight:700;letter-spacing:0;font-size:11px;transition:background .2s,color .2s,border-color .2s}
  .pj-tesis-acc-item.open .pj-tesis-acc-num{background:var(--ink);color:var(--paper)}
  .pj-tesis-acc-title{display:flex;flex-direction:column;gap:3px}
  .pj-tesis-acc-h{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(20px,2vw,26px);line-height:1.05;letter-spacing:-.02em;text-transform:none;color:inherit}
  .pj-tesis-acc-s{font-family:'Poppins',sans-serif;font-size:13px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--mute);line-height:1.4;transition:color .2s}
  .pj-tesis-acc-n{color:var(--mute);font-weight:500;white-space:nowrap;transition:color .2s}
  .pj-tesis-acc-arr{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-family:'Poppins',sans-serif;color:inherit;transition:transform .25s;line-height:1;font-weight:300}
  .pj-tesis-acc-item.open .pj-tesis-acc-arr{transform:rotate(90deg)}
  .pj-tesis-acc-body{display:none;padding:6px 0 28px;animation:accOpen .25s ease}
  .pj-tesis-acc-item.open .pj-tesis-acc-body{display:block}
  @keyframes accOpen{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .pj-tesis-acc-pieces{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .pj-tesis-piece{cursor:pointer;background:#0a0907;overflow:hidden;display:flex;flex-direction:column;gap:8px;position:relative}
  .pj-tesis-piece-img{aspect-ratio:1;background:#0a0907;overflow:hidden}
  .pj-tesis-piece-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.2,.8,.2,1)}
  .pj-tesis-piece:hover .pj-tesis-piece-img img{transform:scale(1.03)}
  .pj-tesis-piece-cap{padding:0 4px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);display:flex;justify-content:space-between;gap:6px;line-height:1.3;background:var(--paper)}
  .pj-tesis-piece-cap span:first-child{color:var(--mute);font-weight:400}
  .pj-tesis-piece-cap span:last-child{font-family:'Poppins',sans-serif;text-transform:none;letter-spacing:0;font-weight:500;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;text-align:right;color:var(--ink)}
  .pj-tesis-acc-foot{margin-top:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute)}
  .pj-tesis-acc-foot button{appearance:none;background:transparent;border:1px solid var(--ink);color:var(--ink);padding:9px 14px;font-family:inherit;font-size:inherit;letter-spacing:inherit;text-transform:inherit;font-weight:600;cursor:pointer}
  .pj-tesis-acc-foot button:hover{background:var(--ink);color:var(--paper)}

  /* legacy chapter cards (kept hidden in case) */
  .pj-tesis-row-systems,.pj-tesis-row-propuestas,.pj-tesis-chapter{display:none}

  /* ── PDF PAGES GRID — Gero-style grid used in Spider-Man / editorial ── */
  .pdf-pages-grid{display:grid;gap:14px}
  .pdf-page-card{cursor:pointer;display:flex;flex-direction:column;gap:8px;background:transparent}
  .pdf-page-card-img{background:#fff;aspect-ratio:3/4;overflow:hidden;border:1px solid var(--rule);transition:border-color .2s,transform .3s cubic-bezier(.2,.8,.2,1)}
  .pdf-page-card-img img{width:100%;height:100%;object-fit:contain;background:#fff}
  .pdf-page-card:hover .pdf-page-card-img{border-color:var(--ink);transform:translateY(-2px)}
  .pdf-page-card-n{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);text-align:center}
  .pdf-page-card:hover .pdf-page-card-n{color:var(--ink)}
  .pdf-page-card-skel .pdf-page-card-img{background:linear-gradient(90deg, #f4f2ec 25%, #ebe7dc 50%, #f4f2ec 75%);background-size:200% 100%;animation:skel 1.2s linear infinite}
  @keyframes skel{from{background-position:200% 0}to{background-position:-200% 0}}

  /* ── SPIDER-MAN simple — single cover → reader (más compacto) ── */
  .pj-spider-simple{display:grid;grid-template-columns:1fr .9fr;gap:24px;padding:80px 0;border-top:1px solid var(--rule);min-height:auto;align-items:center}
  .pj-spider-simple-head{padding:20px 0;display:flex;flex-direction:column;gap:14px;justify-content:center;border:none}
  .pj-spider-simple-meta{display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:500}
  .pj-spider-simple-tag{display:inline-flex;align-items:center;background:var(--ink);color:var(--paper);padding:5px 10px;font-weight:700}
  .pj-spider-simple-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(28px,3vw,42px);line-height:.98;letter-spacing:-.03em;color:var(--ink);margin:0;text-wrap:balance}
  .pj-spider-simple-desc{font-family:'Poppins',sans-serif;font-size:14px;line-height:1.55;color:var(--mute);max-width:48ch;text-wrap:pretty;margin:0}
  .pj-spider-simple-cover{position:relative;cursor:pointer;overflow:hidden;background:#0a0907;display:flex;align-items:center;justify-content:center;min-height:420px;aspect-ratio:auto;margin-left:0}
  .pj-spider-simple-cover img,.pj-spider-simple-cover .pdf-cover-image{width:100%;height:100%;max-width:100%;max-height:520px;object-fit:contain;background:#0a0907;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
  .pj-spider-simple-cover canvas{width:auto;height:auto;max-width:100%;max-height:100%;object-fit:contain;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
  .pj-spider-simple-cover:hover img,.pj-spider-simple-cover:hover canvas{transform:scale(1.025)}
  .pj-spider-simple-cta{position:absolute;left:0;right:0;bottom:0;padding:18px 24px;background:linear-gradient(to top, rgba(10,9,7,.92) 0%, rgba(10,9,7,.4) 60%, rgba(10,9,7,0) 100%);color:#f4f2ec;display:flex;align-items:flex-end;justify-content:space-between;gap:14px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:600}
  .pj-spider-simple-cta-eyebrow{opacity:.7;display:block;margin-bottom:6px;font-size:10px}
  .pj-spider-simple-cta-l{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(16px,1.4vw,20px);line-height:1;letter-spacing:-.02em;text-transform:none;color:#f4f2ec}
  .pj-spider-simple-cta-arr{font-family:'Poppins',sans-serif;font-size:26px;line-height:1;letter-spacing:0;text-transform:none;color:#f4f2ec;transition:transform .25s}
  .pj-spider-simple-cover:hover .pj-spider-simple-cta-arr{transform:translateX(8px)}

  /* ── GORILLAZ simple — toggle Original/Alt + tapa & interior pair ── */
  .pj-gorillaz-simple{display:flex;flex-direction:column;gap:24px;padding:80px 0;border-top:1px solid var(--rule)}
  .pj-gorillaz-simple-head{display:flex;flex-direction:column;gap:10px;padding-bottom:18px;border-bottom:1px solid var(--rule)}
  .pj-gorillaz-simple-meta{display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:500}
  .pj-gorillaz-simple-tag{display:inline-flex;align-items:center;background:var(--ink);color:var(--paper);padding:5px 10px;font-weight:700}
  .pj-gorillaz-simple-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(32px,3.4vw,48px);line-height:.98;letter-spacing:-.03em;color:var(--ink);margin:0;text-wrap:balance}
  .pj-gorillaz-simple-desc{font-family:'Poppins',sans-serif;font-size:14.5px;line-height:1.55;color:var(--mute);max-width:72ch;text-wrap:pretty;margin:0}
  .pj-gorillaz-simple-toggle{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pj-gorillaz-simple-toggle-h{margin-top:8px}
  .pj-gorillaz-simple-toggle button{appearance:none;background:var(--paper);border:1px solid var(--ink);color:var(--ink);padding:10px 18px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;cursor:pointer;transition:background .15s,color .15s}
  .pj-gorillaz-simple-toggle button:hover{background:#f1ede2}
  .pj-gorillaz-simple-toggle button.on{background:var(--ink);color:var(--paper)}
  .pj-gorillaz-simple-toggle-h-tag{margin-left:14px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);font-weight:500}
  .pj-gorillaz-simple-toggle-h-tag b{color:var(--ink);font-weight:700;letter-spacing:.05em}
  .pj-gorillaz-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pj-gorillaz-pair-item{cursor:pointer;display:flex;flex-direction:column;gap:8px;border:1px solid var(--rule);background:var(--paper);transition:border-color .2s,background .2s}
  .pj-gorillaz-pair-item:hover{border-color:var(--ink)}
  .pj-gorillaz-pair-eyebrow{display:flex;justify-content:space-between;align-items:baseline;padding:12px 14px 0;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);font-weight:600}
  .pj-gorillaz-pair-eyebrow .open{color:var(--ink);font-weight:700;opacity:0;transition:opacity .2s}
  .pj-gorillaz-pair-item:hover .pj-gorillaz-pair-eyebrow .open{opacity:1}
  .pj-gorillaz-pair-img{aspect-ratio:4/3;background:#f4f2ec;overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0 12px 12px}
  .pj-gorillaz-pair-img img{width:100%;height:100%;object-fit:contain;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
  .pj-gorillaz-pair-item:hover .pj-gorillaz-pair-img img{transform:scale(1.02)}

  /* ── KOIZONE — flipbook button + mockup grid ── */
  .pj-koizone{display:flex;flex-direction:column;gap:24px;padding:80px 0;border-top:1px solid var(--rule)}
  .pj-koizone-head{display:flex;flex-direction:column;gap:10px;padding-bottom:18px;border-bottom:1px solid var(--rule)}
  .pj-koizone-meta{display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:500}
  .pj-koizone-meta b{color:var(--ink);font-weight:700}
  .pj-koizone-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(32px,3.4vw,48px);line-height:.98;letter-spacing:-.03em;color:var(--ink);margin:0;text-wrap:balance}
  .pj-koizone-desc{font-family:'Poppins',sans-serif;font-size:14.5px;line-height:1.55;color:var(--mute);max-width:72ch;text-wrap:pretty;margin:0}
  .pj-koizone-stage{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;align-items:stretch}
  .pj-koizone-flip{appearance:none;border:1px solid var(--ink);background:var(--paper);cursor:pointer;display:flex;flex-direction:column;gap:0;overflow:hidden;padding:0;font-family:inherit;text-align:left;color:var(--ink);transition:background .2s}
  .pj-koizone-flip:hover{background:#f1ede2}
  .pj-koizone-flip-cover{flex:1;min-height:380px;background:#0a0907;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .pj-koizone-flip-cover canvas,.pj-koizone-flip-cover img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;background:#0a0907;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
  .pj-koizone-flip:hover .pj-koizone-flip-cover canvas,.pj-koizone-flip:hover .pj-koizone-flip-cover img{transform:scale(1.02)}
  .pj-koizone-flip-cta{display:flex;align-items:baseline;justify-content:space-between;gap:14px;padding:20px 22px;background:var(--ink);color:var(--paper);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:600}
  .pj-koizone-flip-cta .eye{opacity:.7}
  .pj-koizone-flip-cta .l{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(18px,1.6vw,22px);line-height:1;letter-spacing:-.02em;text-transform:none;flex:1;text-align:right}
  .pj-koizone-flip-cta .arr{font-family:'Poppins',sans-serif;font-size:22px;letter-spacing:0;line-height:1;transition:transform .25s}
  .pj-koizone-flip:hover .pj-koizone-flip-cta .arr{transform:translateX(6px)}
  .pj-koizone-side{display:flex;flex-direction:column;gap:14px}
  .pj-koizone-side-h{display:flex;align-items:baseline;gap:12px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:500;padding-bottom:10px;border-bottom:1px solid var(--rule);margin-top:4px}
  .pj-koizone-side-h:first-child{margin-top:0}
  .pj-koizone-side-h .n{background:var(--ink);color:var(--paper);padding:4px 8px;font-weight:700;letter-spacing:0}
  .pj-koizone-side-h h4{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(16px,1.4vw,20px);letter-spacing:-.02em;text-transform:none;color:var(--ink);margin:0;line-height:1}
  .pj-koizone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pj-koizone-tile{appearance:none;background:transparent;border:1px solid var(--rule);cursor:pointer;padding:0;display:flex;flex-direction:column;gap:0;overflow:hidden;transition:border-color .15s;text-align:left;font-family:inherit;color:var(--ink)}
  .pj-koizone-tile:hover{border-color:var(--ink)}
  .pj-koizone-tile-img{aspect-ratio:4/3;background:#f4f2ec;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .pj-koizone-tile-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s cubic-bezier(.2,.8,.2,1)}
  .pj-koizone-tile:hover .pj-koizone-tile-img img{transform:scale(1.05)}
  .pj-koizone-tile-l{padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink);font-weight:500;line-height:1.4;font-family:'Poppins',sans-serif;text-transform:none;letter-spacing:0;font-size:12px}

  /* ── SPIDER-MAN LIBRO — editorial display Gero-style ── */
  .pj-spider{display:flex;flex-direction:column;gap:32px;padding:80px 0;border-top:1px solid var(--rule)}
  .pj-spider-head{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;padding-bottom:18px;border-bottom:1px solid var(--rule)}
  .pj-spider-head-l{display:flex;flex-direction:column;gap:12px}
  .pj-spider-num{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .pj-spider-num .tag{background:var(--ink);color:var(--paper);padding:5px 10px;font-weight:600;letter-spacing:.2em}
  .pj-spider-num .count{border:1px solid var(--ink);color:var(--ink);padding:5px 10px;font-weight:600}
  .pj-spider-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(32px,3.6vw,52px);line-height:1;letter-spacing:-.025em;color:var(--ink);text-wrap:balance;margin:0}
  .pj-spider-desc{font-family:'Poppins',sans-serif;font-size:14.5px;line-height:1.55;color:var(--mute);max-width:62ch;text-wrap:pretty;margin:0;padding-top:4px}
  .pj-spider-head-r{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .pj-spider-head-r button{appearance:none;background:var(--ink);color:var(--paper);border:1px solid var(--ink);padding:13px 18px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;cursor:pointer;transition:background .2s,color .2s}
  .pj-spider-head-r button:hover{background:transparent;color:var(--ink)}
  .pj-spider-pages-wrap .pdf-pages-grid{grid-template-columns:repeat(6,1fr);gap:16px}

  /* ── GORILLAZ — editorial strip ── */
  .pj-gorillaz{display:flex;flex-direction:column;gap:28px;padding:80px 0;border-top:1px solid var(--rule)}
  .pj-gorillaz-head{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;padding-bottom:18px;border-bottom:1px solid var(--rule)}
  .pj-gorillaz-head-l{display:flex;flex-direction:column;gap:10px}
  .pj-gorillaz-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(32px,3.6vw,52px);line-height:1;letter-spacing:-.025em;color:var(--ink);margin:0}
  .pj-gorillaz-meta{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute)}
  .pj-gorillaz-meta b{color:var(--ink);font-weight:700}
  .pj-gorillaz-desc{font-family:'Poppins',sans-serif;font-size:14.5px;line-height:1.55;color:var(--mute);max-width:60ch;text-wrap:pretty;margin:0;padding-top:6px}

  /* 3-block editorial strip: cover, interior, color versions */
  .pj-gorillaz-strip{display:grid;grid-template-columns:1fr 1fr 1.5fr;gap:18px}
  .pj-gorillaz-block{display:flex;flex-direction:column;gap:10px}
  .pj-gorillaz-block-h{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink);font-weight:700;padding-bottom:8px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .pj-gorillaz-block-h .n{color:var(--mute);font-weight:400;letter-spacing:.16em}
  .pj-gorillaz-block-img{background:#0a0907;overflow:hidden;display:flex;align-items:center;justify-content:center;aspect-ratio:3/4;cursor:pointer;position:relative}
  .pj-gorillaz-block-img img{width:100%;height:100%;object-fit:contain;background:#0a0907;transition:transform .5s cubic-bezier(.2,.8,.2,1)}
  .pj-gorillaz-block-img:hover img{transform:scale(1.03)}
  .pj-gorillaz-block-cap{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute)}
  .pj-gorillaz-block:hover .pj-gorillaz-block-cap{color:var(--ink)}
  /* Color versions — internal triple */
  .pj-gorillaz-versions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .pj-gorillaz-version{cursor:pointer;display:flex;flex-direction:column;gap:6px;background:transparent}
  .pj-gorillaz-version-img{background:#0a0907;overflow:hidden;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center}
  .pj-gorillaz-version-img img{width:100%;height:100%;object-fit:contain;transition:transform .5s cubic-bezier(.2,.8,.2,1)}
  .pj-gorillaz-version:hover .pj-gorillaz-version-img img{transform:scale(1.04)}
  .pj-gorillaz-version-l{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);text-align:center}
  .pj-gorillaz-version:hover .pj-gorillaz-version-l{color:var(--ink)}
  /* Color filters per version */
  .pj-gorillaz-version.v-bw img{filter:grayscale(1) contrast(1.15)}
  .pj-gorillaz-version.v-red img{filter:none}
  .pj-gorillaz-version.v-yellow img{filter:sepia(.6) saturate(2.6) hue-rotate(10deg) brightness(1.05)}

  /* ── NUEVE REINAS — section grid + big afiche aside ── */
  .pj-9r{display:flex;flex-direction:column;gap:28px;padding:80px 0;border-top:1px solid var(--rule)}
  .pj-9r-head{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;padding-bottom:18px;border-bottom:1px solid var(--rule);flex-wrap:wrap}
  .pj-9r-head-l{display:flex;flex-direction:column;gap:10px}
  .pj-9r-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(32px,3.6vw,52px);line-height:1;letter-spacing:-.025em;color:var(--ink);margin:0;text-wrap:balance}
  .pj-9r-meta{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute)}
  .pj-9r-meta b{color:var(--ink);font-weight:700}
  .pj-9r-desc{font-family:'Poppins',sans-serif;font-size:14.5px;line-height:1.55;color:var(--mute);max-width:62ch;text-wrap:pretty;margin:0;padding-top:6px}

  .pj-9r-stage{display:grid;grid-template-columns:1.05fr 1fr;gap:20px;align-items:stretch}
  .pj-9r-afiche{background:#0a0907;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;min-height:560px;position:relative;border:1.5px solid var(--ink);box-shadow:none}
  .pj-9r-afiche img{width:100%;height:100%;object-fit:contain;background:#0a0907;transition:transform .6s cubic-bezier(.2,.8,.2,1);padding:8px}
  .pj-9r-afiche:hover img{transform:scale(1.02)}

  /* Vertical list (Tesis-style) for 9R sections */
  .pj-9r-list{display:flex;flex-direction:column;gap:18px}
  .pj-9r-list-group{display:flex;flex-direction:column;gap:0;border:1px solid var(--ink)}
  .pj-9r-list-group-h{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--ink);color:var(--paper);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:500}
  .pj-9r-list-group-h b{color:#f4f2ec;font-weight:700}
  .pj-9r-list-group-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:var(--paper);color:var(--ink);font-weight:700;letter-spacing:0;font-size:11px}
  .pj-9r-row{appearance:none;display:grid;grid-template-columns:96px 1fr auto;gap:18px;align-items:center;padding:14px 18px;background:var(--paper);color:var(--ink);border:none;border-top:1px solid var(--rule);cursor:pointer;font-family:inherit;text-align:left;transition:background .15s,color .15s}
  .pj-9r-row:first-child{border-top:none}
  .pj-9r-row:hover{background:var(--ink);color:var(--paper)}
  .pj-9r-row-img{width:96px;height:72px;background:#0a0907;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .pj-9r-row-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s cubic-bezier(.2,.8,.2,1)}
  .pj-9r-row:hover .pj-9r-row-img img{transform:scale(1.04)}
  .pj-9r-row-body{display:flex;flex-direction:column;gap:3px}
  .pj-9r-row-num{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;opacity:.55;font-weight:600}
  .pj-9r-row-h{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(18px,1.7vw,22px);line-height:1.05;letter-spacing:-.02em;margin:0;color:inherit;text-transform:none}
  .pj-9r-row-sub{font-family:'Poppins',sans-serif;font-size:12.5px;line-height:1.35;font-weight:400;color:var(--mute);transition:color .15s}
  .pj-9r-row:hover .pj-9r-row-sub{color:rgba(244,242,236,.7)}
  .pj-9r-row-arr{font-family:'Poppins',sans-serif;font-size:20px;line-height:1;color:inherit;transition:transform .25s}
  .pj-9r-row:hover .pj-9r-row-arr{transform:translateX(6px)}
  .pj-9r-afiche canvas{max-width:100%;max-height:100%;background:#0a0907}
  .pj-9r-afiche-tag{position:absolute;top:14px;left:14px;background:#f4f2ec;color:var(--ink);padding:5px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;z-index:2}

  .pj-9r-sections{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start}
  .pj-9r-section{appearance:none;cursor:pointer;background:var(--paper);border:1px solid var(--ink);padding:0;display:grid;grid-template-rows:auto 1fr;overflow:hidden;text-align:left;font-family:inherit;transition:background .2s,color .2s;min-height:200px;color:var(--ink)}
  .pj-9r-section-cover{position:relative;aspect-ratio:4/3;background:#0a0907;overflow:hidden}
  .pj-9r-section-cover img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.2,.8,.2,1),filter .25s}
  .pj-9r-section:hover .pj-9r-section-cover img{transform:scale(1.04);filter:brightness(.85)}
  .pj-9r-section-num{position:absolute;top:10px;left:10px;background:var(--paper);color:var(--ink);padding:5px 9px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0}
  .pj-9r-section:hover .pj-9r-section-num{background:var(--ink);color:var(--paper)}
  .pj-9r-section-body{padding:14px 16px;display:flex;flex-direction:column;gap:6px;justify-content:space-between;min-height:90px}
  .pj-9r-section:hover{background:var(--ink);color:var(--paper)}
  .pj-9r-section-sub{font-family:'Poppins',sans-serif;font-size:12.5px;line-height:1.35;color:var(--mute);font-weight:400;text-transform:none;letter-spacing:0;transition:color .2s}
  .pj-9r-section:hover .pj-9r-section-sub{color:rgba(244,242,236,.7)}
  .pj-9r-section-top{display:none}
  .pj-9r-section-h{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(18px,1.7vw,22px);line-height:1.05;letter-spacing:-.02em;text-transform:none;color:inherit;margin:0}
  .pj-9r-section-foot{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;gap:10px;opacity:.7}
  .pj-9r-section-foot .arr{font-family:'Poppins',sans-serif;font-size:20px;line-height:1;transition:transform .25s}
  .pj-9r-section:hover .pj-9r-section-foot .arr{transform:translateX(6px)}

  /* 3D FEATURE CARD — Auto Retrofuturista (header reforzado) */
  .pj-3d{display:flex;flex-direction:column;gap:28px;padding:96px 0 80px;border-top:1px solid var(--ink);cursor:pointer;position:relative}
  .pj-3d::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:var(--ink)}
  .pj-3d-head{display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:end;padding-bottom:18px;border-bottom:1px solid var(--rule);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute)}
  .pj-3d-head .pj-num{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:var(--paper);padding:7px 12px;font-weight:700;letter-spacing:.22em}
  .pj-3d-section-h{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(28px,3vw,42px);line-height:1;letter-spacing:-.025em;color:var(--ink);text-transform:none;letter-spacing:-.025em;font-family:'Poppins',sans-serif;justify-self:start;margin:0}
  .pj-3d-hero{position:relative;overflow:hidden;background:#0c0c0c;aspect-ratio:16/9;min-height:420px}
  .pj-3d-hero img{width:100%;height:100%;object-fit:cover;transition:transform .8s cubic-bezier(.2,.8,.2,1)}
  .pj-3d:hover .pj-3d-hero img{transform:scale(1.025)}
  .pj-3d-hero-label{position:absolute;left:0;right:0;bottom:0;padding:36px 40px;background:linear-gradient(to top, rgba(12,12,12,.92) 0%, rgba(12,12,12,.55) 60%, rgba(12,12,12,0) 100%);color:var(--paper)}
  .pj-3d-main-h{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(34px,4vw,64px);line-height:.95;letter-spacing:-.03em;color:var(--paper);margin:10px 0}
  .pj-3d-main-meta{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(244,242,236,.7)}
  .pj-3d-anim-pill{position:absolute;top:20px;right:20px;background:rgba(244,242,236,.95);color:var(--ink);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:7px 12px;font-weight:700}
  .pj-3d-foot{display:flex;flex-direction:column;gap:10px;padding-top:18px}
  .pj-3d-desc{font-size:14.5px;line-height:1.6;color:var(--mute);max-width:760px;text-wrap:pretty}
  .pj-3d-meta{display:flex;gap:14px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);padding-top:6px}
  .pj-3d-meta b{color:var(--ink);font-weight:600}

  /* COMIC pages — wider on illu */
  #s-comic .comic-pages{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;margin-bottom:24px}
  #s-comic .comic-pages .cpage img{aspect-ratio:3/4;object-fit:cover}
  #s-comic .comic-cta{margin-top:24px;padding-top:0;border-top:none}

  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:24px}
  .gcard{cursor:pointer;overflow:hidden;position:relative;background:transparent;display:flex;flex-direction:column;gap:10px}
  .gcard-img{width:100%;aspect-ratio:1;background:#fff;overflow:hidden;position:relative}
  .gcard-img.bw{background:#fff}
  .gcard-img.bw img{filter:grayscale(1) contrast(1.18) brightness(1.06)}
  .gcard-img img{width:100%;height:100%;object-fit:cover;object-position:center;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
  .gcard:hover .gcard-img img{transform:scale(1.03)}
  /* Dark series cards: card background blends with section */
  .sec-dark .gcard-img,.sec-dark .gcard-img.bw{background:#0a0907}
  /* ATUS GO (movement) — composiciones horizontales: contain on black para no cortar */
  #s-movement .gcard-img,#s-movement .gcard-img.bw{background:#0a0907;aspect-ratio:4/3}
  #s-movement .gcard-img img{object-fit:contain;padding:6px}
  .gcard-cap{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);opacity:1;transition:color .2s}
  .gcard:hover .gcard-cap .t{color:var(--ink)}
  .gcard-cap .t{color:var(--ink);font-family:'Poppins',sans-serif;text-transform:none;letter-spacing:0;font-weight:500;font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* PDF reader — pages as a flipbook (real rendered canvases) */
  .pdf-reader{width:100%;height:94vh;background:#1a1a1a;display:flex;flex-direction:column;overflow:hidden;position:relative}
  .pdf-stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:16px;position:relative;cursor:pointer;min-height:0}
  .pdf-page-wrap{display:flex;gap:10px;align-items:center;justify-content:center;width:100%;height:100%;max-width:100%;max-height:100%}
  .pdf-canvas{box-shadow:0 12px 36px rgba(0,0,0,.4);background:#fff;max-height:calc(94vh - 110px);max-width:100%;width:auto;height:auto;object-fit:contain;display:block}
  /* In spread mode, two pages share the row — each can claim at most ~50% */
  .pdf-page-wrap.is-spread .pdf-canvas{max-width:calc(50% - 6px)}
  .pdf-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.55);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase}
  .pdf-loading::before{content:'';width:24px;height:24px;border:2px solid rgba(255,255,255,.18);border-top-color:rgba(255,255,255,.6);border-radius:50%;margin-right:14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .pdf-edge{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.18);width:44px;height:80px;font-size:32px;line-height:1;cursor:pointer;font-family:Georgia,serif;font-weight:300;transition:background .15s,color .15s;display:flex;align-items:center;justify-content:center;padding:0}
  .pdf-edge:hover:not(:disabled){background:rgba(255,255,255,.15);color:#fff}
  .pdf-edge:disabled{opacity:.15;cursor:not-allowed}
  .pdf-edge-l{left:14px}
  .pdf-edge-r{right:14px}
  .pdf-controls{background:#0c0c0c;padding:14px 22px;display:flex;justify-content:space-between;align-items:center;gap:14px;border-top:1px solid rgba(244,242,236,.16)}
  .pdf-nav{display:flex;gap:6px}
  .pdf-nav button{background:transparent;color:var(--paper);border:1px solid rgba(244,242,236,.55);padding:9px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;cursor:pointer;transition:background .15s,color .15s}
  .pdf-nav button:hover:not(:disabled){background:var(--paper);color:var(--ink);border-color:var(--paper)}
  .pdf-nav button:disabled{opacity:.3;cursor:not-allowed}
  .pdf-info{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(244,242,236,.82);font-weight:600}
  .pdf-mode{display:flex;gap:0;border:1px solid var(--paper)}
  .pdf-mode button{background:transparent;color:var(--paper);border:none;border-right:1px solid rgba(244,242,236,.4);padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;cursor:pointer;transition:background .15s,color .15s}
  .pdf-mode button:hover{background:rgba(244,242,236,.12)}
  .pdf-mode button:last-child{border-right:none}
  .pdf-mode button.on{background:var(--paper);color:var(--ink)}

  /* COMIC */{display:grid;grid-template-columns:repeat(5,1fr);gap:24px}
  .cpage{cursor:pointer;overflow:hidden;background:#fff;position:relative;display:flex;flex-direction:column;gap:10px}
  .cpage img{width:100%;aspect-ratio:3/4;object-fit:cover;transition:transform .6s cubic-bezier(.2,.8,.2,1)}
  .cpage:hover img{transform:scale(1.025)}
  .cpage-num{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);text-align:center}
  .comic-cta{margin-top:48px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding-top:32px;border-top:1px solid var(--rule)}

  /* ABOUT */
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
  .about-l p{font-family:'Poppins',sans-serif;font-weight:400;font-size:18px;line-height:1.6;max-width:520px;margin-bottom:20px;text-wrap:pretty}
  .about-l p b{font-weight:600}
  .about-stats{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--rule);margin-top:40px}
  .about-stat{padding:20px 0;border-bottom:1px solid var(--rule);display:grid;gap:6px}
  .about-stat:nth-child(odd){padding-right:20px}
  .about-stat:nth-child(even){padding-left:20px;border-left:1px solid var(--rule)}
  .about-stat .k{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute)}
  .about-stat .v{font-family:'Poppins',sans-serif;font-weight:500;font-size:15px;color:var(--ink)}
  .about-r{overflow:hidden;background:var(--paper-2);aspect-ratio:4/3}
  .about-r img{width:100%;height:100%;object-fit:cover;object-position:center}

  /* CONTACT */
  .contact{background:var(--ink);color:var(--paper);padding:120px 0;position:relative}
  .contact .sec-num{color:rgba(244,242,236,.55)}
  .contact .sec-title{color:var(--paper)}
  .contact .sec-meta{color:rgba(244,242,236,.6)}
  .contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid rgba(244,242,236,.18);margin-bottom:60px}
  .ci{padding:32px 0;border-bottom:1px solid rgba(244,242,236,.18)}
  .ci:nth-child(2){padding-left:40px;border-left:1px solid rgba(244,242,236,.18)}
  .ci:nth-child(3){padding-left:40px;border-left:1px solid rgba(244,242,236,.18)}
  .ci .k{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:rgba(244,242,236,.5);margin-bottom:12px}
  .ci a{font-family:'Poppins',sans-serif;font-weight:500;font-size:clamp(18px,1.6vw,22px);color:var(--paper);text-decoration:none;line-height:1.15;word-break:break-word;border-bottom:1px solid transparent;transition:border-color .2s}
  .ci a:hover{border-bottom-color:var(--paper)}
  .ci .small{font-family:'Poppins',sans-serif;color:rgba(244,242,236,.5);font-size:13px;margin-top:8px}
  .contact-cta{display:flex;gap:12px;flex-wrap:wrap}
  .contact-cta a{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:var(--paper);text-decoration:none;border:1px solid rgba(244,242,236,.4);padding:14px 22px;transition:background .2s,color .2s,border-color .2s}
  .contact-cta a.primary{background:var(--paper);color:var(--ink);border-color:var(--paper)}
  .contact-cta a.primary:hover{background:transparent;color:var(--paper);border-color:var(--paper)}
  .contact-cta a:hover{border-color:var(--paper);background:var(--paper);color:var(--ink)}

  .footer{background:var(--ink);color:rgba(244,242,236,.4);padding:24px 0;border-top:1px solid rgba(244,242,236,.12);font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase}
  .footer .wrap{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}

  /* MODAL */
  .modal{position:fixed;inset:0;background:rgba(10,10,10,.55);backdrop-filter:blur(14px) saturate(1.1);-webkit-backdrop-filter:blur(14px) saturate(1.1);z-index:10000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s,backdrop-filter .25s;padding:24px}
  .modal.open{opacity:1;pointer-events:auto}

  /* Zoom on demand — applied via .zoomed class to .modal-img-col */
  .modal-img-col img{cursor:zoom-in;transition:transform .25s ease}
  .modal-img-col.zoomed{overflow:auto;cursor:grab;align-items:flex-start;justify-content:flex-start}
  .modal-img-col.zoomed img{cursor:zoom-out;max-width:none;max-height:none;width:auto;height:auto;transform:scale(2);transform-origin:0 0}
  .modal-zoom-btn{position:absolute;top:16px;left:16px;z-index:6;background:var(--ink);color:var(--paper);border:none;padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .modal-zoom-btn:hover{background:var(--paper);color:var(--ink);outline:1px solid var(--ink)}
  .modal-dark .modal-zoom-btn{background:#f4f2ec;color:#0a0907}
  .modal-dark .modal-zoom-btn:hover{background:#0a0907;color:#f4f2ec;outline:1px solid #f4f2ec}

  /* Version toggle (Gorillaz Normal/Alt) in image-col */
  .modal-version-toggle{position:absolute;top:16px;left:130px;z-index:6;display:inline-flex;gap:0;border:1px solid var(--ink)}
  .modal-version-toggle button{background:transparent;color:var(--ink);border:none;border-right:1px solid var(--ink);padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;cursor:pointer}
  .modal-version-toggle button:last-child{border-right:none}
  .modal-version-toggle button.on{background:var(--ink);color:var(--paper)}

  /* PDF reader — bigger by default (user can also enable zoom) */
  .pdf-reader.zoomed .pdf-canvas{max-height:none;height:auto;max-width:none;width:auto}
  .pdf-reader.zoomed .pdf-stage{overflow:auto;align-items:flex-start;justify-content:flex-start}
