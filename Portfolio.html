function ProjectModal({ project, startIdx, onClose, lang }) {
  const t = I18N[lang].design;
  const tm = I18N[lang].modal;
  const [i, setI] = useState(0);
  const [imgZoom, setImgZoom] = useState(false);
  const [altVersion, setAltVersion] = useState(false);
  const infoRef = React.useRef(null);
  useEffect(() => {setI(startIdx || 0);}, [project, startIdx]);
  useEffect(() => {setImgZoom(false);}, [i, project]);
  useEffect(() => {setAltVersion(false);}, [project]);
  useEffect(() => {
    if (!project) return;
    const fn = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft') setI((x) => Math.max(0, x - 1));
      if (e.key === 'ArrowRight') setI((x) => Math.min(Math.max(0, (project.assets?.length || 1) - 1), x + 1));
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [project, onClose]);
  useEffect(() => {
    document.body.style.overflow = project ? 'hidden' : '';
    return () => {document.body.style.overflow = '';};
  }, [project]);

  // When startIdx changes (e.g. clicking a section card), scroll the info panel to that section header.
  // Skip when opening from the hero (startIdx === 0) — first section is already at the top.
  useEffect(() => {
    if (!project || !infoRef.current) return;
    if (!startIdx || startIdx <= 0) {
      // Reset to top whenever a project (re)opens at index 0
      infoRef.current.scrollTo({ top: 0, behavior: 'instant' });
      return;
    }
    const a = project.assets[startIdx];
    if (!a || !a.section) return;
    // small timeout so the section header is in the DOM
    const id = setTimeout(() => {
      const el = infoRef.current.querySelector(`[data-section-anchor="${CSS.escape(a.section)}"]`);
      if (el && infoRef.current) {
        const top = el.getBoundingClientRect().top - infoRef.current.getBoundingClientRect().top + infoRef.current.scrollTop - 12;
        infoRef.current.scrollTo({ top, behavior: 'smooth' });
      }
    }, 80);
    return () => clearTimeout(id);
  }, [project, startIdx]);

  if (!project) return null;
  const total = project.assets.length;
  const a = total > 0 ? project.assets[i] : null;

  // Build section groups for nav + thumbs (preserves order)
  const groups = [];
  const counts = {};
  project.assets.forEach((as, idx) => {
    const key = as.section || '';
    counts[key] = (counts[key] || 0) + 1;
    let g = groups.find((x) => x.label === key);
    if (!g) { g = { label: key, firstIdx: idx, items: [] }; groups.push(g); }
    g.items.push({ as, idx });
  });
  const hasSections = groups.length > 1 && groups.some((g) => g.label);
  const currentSection = a && a.section ? a.section : (groups[0] && groups[0].label);

  const jumpToSection = (label) => {
    const g = groups.find((x) => x.label === label);
    if (!g) return;
    setI(g.firstIdx);
  };

  return (
    <div className="modal open"
    onClick={(e) => {if (e.target.classList.contains('modal')) onClose();}}>
      <div className={`modal-inner`}>
        <button className="modal-x" onClick={onClose} aria-label="Cerrar">×</button>
        <div className={`modal-img-col ${imgZoom && a && a.type==='img' ? 'zoomed' : ''}`}
             style={altVersion && project.alt && a && a.type==='img' ? { filter: project.alt.filter } : null}>
          {a && a.type === 'img' &&
            <button className="modal-zoom-btn" onClick={() => setImgZoom(z => !z)} title="Zoom">
              {imgZoom ? '− Zoom' : '+ Zoom'}
            </button>
          }
          {project.alt && a && a.type === 'img' &&
            <div className="modal-version-toggle">
              <button className={!altVersion ? 'on' : ''} onClick={() => setAltVersion(false)}>Normal</button>
              <button className={altVersion ? 'on' : ''} onClick={() => setAltVersion(true)}>Alt</button>
            </div>
          }
          {a ? <AssetView
                  asset={a}
                  onEnded={() => {if (project.autoRotate || a.autoRotate) setI((x) => (x + 1) % total);}}
                  altVersion={altVersion}
                  onToggleVersion={setAltVersion}
                  hasAlt={!!project.alt && a.type === 'pdf'}
               /> : <img src={project.cover} alt={project.name} onClick={() => setImgZoom(z=>!z)} />}
          {total > 1 &&
          <div className={`modal-mini ${a && a.type === 'pdf' ? 'modal-mini-pdf' : ''}`}>
              <button onClick={() => setI((x) => (x - 1 + total) % total)} aria-label="Anterior"><span className="mm-arrow">←</span><span className="mm-label">{tm.prev.replace(/[←→]/g,'').trim()}</span></button>
              <span className="counter">{a && a.section ? `${a.section} · ` : ''}{i + 1} / {total}</span>
              <button onClick={() => setI((x) => (x + 1) % total)} aria-label="Siguiente"><span className="mm-label">{tm.next.replace(/[←→]/g,'').trim()}</span><span className="mm-arrow">→</span></button>
            </div>
          }
        </div>
        <div className="modal-info" ref={infoRef}>
          {hasSections &&
            <nav className="modal-sec-nav" aria-label="Secciones del proyecto">
              <div className="modal-sec-nav-l">↳ Saltar a sección</div>
              {groups.map((g) =>
                <button key={g.label || '_'}
                  className={currentSection === g.label ? 'on' : ''}
                  onClick={() => jumpToSection(g.label)}>
                  {g.label || '—'} <span className="n">({g.items.length})</span>
                </button>
              )}
            </nav>
          }
          <div className="k"><span>{project.cat}</span><span>{project.year}</span></div>
          <h3>{project.name}</h3>
          <div className="meta">
            <div><div className="lab">{t.cat}</div><div className="val" style={{ textTransform: 'none' }}>{project.cat}</div></div>
            <div><div className="lab">{tm.year}</div><div className="val">{project.year}</div></div>
            <div style={{ gridColumn: 'span 2' }}><div className="lab">{t.role}</div><div className="val" style={{ textTransform: 'none', fontWeight: 600 }}>{project.role}</div></div>
          </div>
          <p>{project.desc[lang]}</p>
          {project.pendingFig &&
          <p style={{ marginTop: 10, padding: '8px 10px', background: '#0c0c0c', color: '#f4f2ec', fontSize: 12, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '.1em', textTransform: 'uppercase' }}>
              ⚠ {tm.pendingNote}
            </p>
          }
          {total > 0 &&
          <div className="modal-thumbs">
              <div className="k">{a.label}</div>
              {groups.map((g, gi) => {
                const showHeaders = hasSections;
                return (
                  <div key={g.label || '_'} className="thumbs-section" data-section-anchor={g.label || ''}>
                    {showHeaders && g.label &&
                      <div className="thumbs-section-h">
                        <span className="h-l">{g.label}</span>
                        <span className="h-n">{String(gi+1).padStart(2,'0')} · {g.items.length} piezas</span>
                      </div>
                    }
                    <div className="thumbs-strip">
                      {g.items.map(({ as, idx }) =>
                        <div key={idx} className={`thumb ${idx === i ? 'on' : ''}`}
                          onClick={() => setI(idx)} title={as.label}>
                          {as.type === 'img' ?
                            <img src={as.src} alt={as.label} loading="lazy" /> :
                            as.type === 'video' ?
                              <><span className="pill">▶</span>
                                <video src={as.src} muted preload="metadata" style={{ width: '100%', height: '100%', objectFit: 'cover' }} /></> :
                              <PdfThumb src={as.src} fallback={as.cover || project.cover} alt={as.label} />}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          }
          <div className="modal-actions">
            <button className="primary" onClick={onClose}>{tm.back}</button>
            {a && a.type === 'video' && <a href={a.src} target="_blank" rel="noreferrer">{tm.openVideo} →</a>}
          </div>
        </div>
      </div>
    </div>);

}

function ComicReader({ open, start, mode: initMode, onClose, lang }) {
  const t = I18N[lang].comic;
  const [page, setPage] = useState(start || 0);
  const [mode, setMode] = useState(initMode || 'book');
  useEffect(() => {if (open) {setPage(start || 0);setMode(initMode || 'book');}}, [open, start, initMode]);
  useEffect(() => {
    if (!open) return;
    const step = mode === 'book' ? 2 : 1;
    const fn = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft') setPage((p) => Math.max(0, p - step));
      if (e.key === 'ArrowRight') setPage((p) => Math.min(COMIC.length - 1, p + step));
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [open, mode, onClose]);
  useEffect(() => {
    document.body.style.overflow = open ? 'hidden' : '';
    return () => {document.body.style.overflow = '';};
  }, [open]);
  if (!open) return null;
  const total = COMIC.length;
  const left = COMIC[page];
  const right = mode === 'book' && page + 1 < total ? COMIC[page + 1] : null;
  const step = mode === 'book' ? 2 : 1;
  return (
    <div className="reader open">
      <button className="modal-x reader-x" onClick={onClose} aria-label="Cerrar">×</button>
      <div className="reader-bar">
        <span className="title">{t.title}</span>
        <span>{right ? `${left.n}–${right.n}` : left.n} / {total}</span>
        <span></span>
      </div>
      <div className="reader-stage">
        <img src={left.img} alt={`P${left.n}`} />
        {right && <img src={right.img} alt={`P${right.n}`} />}
      </div>
      <div className="reader-controls">
        <button disabled={page === 0} onClick={() => setPage((p) => Math.max(0, p - step))}>{t.prev}</button>
        <div className="reader-mode">
          <button className={mode === 'book' ? 'on' : ''} onClick={() => setMode('book')}>{t.book}</button>
          <button className={mode === 'single' ? 'on' : ''} onClick={() => setMode('single')}>{t.page}</button>
        </div>
        <button disabled={page >= total - 1} onClick={() => setPage((p) => Math.min(total - 1, p + step))}>{t.next}</button>
      </div>
    </div>);

}

function App() {
  const [lang, setLangState] = useState(getLang());
  const [view, setViewState] = useState('home'); // 'home' | 'design' | 'illu'
  const [active, setActive] = useState('hero');
  const [workIdx, setWorkIdx] = useState(null);
  const [project, setProject] = useState(null);
  const [projectStartIdx, setProjectStartIdx] = useState(0);
  const openProject = (p, idx = 0) => { setProjectStartIdx(idx); setProject(p); };
  const [reader, setReader] = useState({ open: false, start: 0, mode: 'book' });
  const [brokenVideos, setBrokenVideos] = useState(new Set());

  const setView = (v) => {
    // Defensive: close any open modal/reader before switching sections
    setWorkIdx(null);
    setProject(null);
    setReader((r) => ({ ...r, open: false }));
    setViewState(v);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  // ── Background preload: heavy assets on idle, fluid experience ──
  useEffect(() => {
    let cancelled = false;
    const pdfs = [];
    const videos = [];
    DESIGN.forEach((p) => {
      (p.assets || []).forEach((a) => {
        if (a.type === 'pdf') pdfs.push(a.src);
        if (a.type === 'video') videos.push(a.src);
      });
      if (p.cover && p.cover.startsWith('PDF:')) pdfs.push(p.cover.slice(4));
      if (p.cover && p.cover.endsWith('.mp4')) videos.push(p.cover);
    });
    const uniqPdfs = Array.from(new Set(pdfs));
    const uniqVids = Array.from(new Set(videos));

    // Run preloads SERIALLY and only after the page is fully idle (3s grace)
    const start = setTimeout(async () => {
      if (cancelled) return;
      // 1) PDFs — one at a time, sleep between. En MOBILE no los precargamos: son
      //    archivos pesados (hasta 24MB) que competirían con las imágenes y gastarían
      //    datos del usuario; el PDF se carga igual al abrir el lector.
      const __preloadMobile = (typeof window !== 'undefined' && window.innerWidth <= 980);
      if (!__preloadMobile && window.pdfjsLib) {
        for (const src of uniqPdfs) {
          if (cancelled) return;
          try {
            const pdf = await pdfjsLib.getDocument(src).promise;
            await pdf.getPage(1);
          } catch (e) {}
          // small pause to keep main thread free
          await new Promise(r => setTimeout(r, 400));
        }
      }
      // 2) Videos — just kick off metadata
      for (const src of uniqVids) {
        if (cancelled) return;
        const v = document.createElement('video');
        v.preload = 'metadata';
        v.muted = true;
        v.src = src;
        v.addEventListener('error', () => {
          setBrokenVideos((s) => { const n = new Set(s); n.add(src); return n; });
        });
        await new Promise(r => setTimeout(r, 200));
      }
    }, 3000);

    return () => { cancelled = true; clearTimeout(start); };
  }, []);

  // ── Precarga de IMÁGENES de la vista actual, en orden de arriba hacia abajo ──
  // Apenas se monta una sección, vamos cargando sus imágenes (en orden del DOM, o
  // sea de arriba hacia abajo) de a varias a la vez, SIN bloquear el render. Así,
  // cuando el usuario scrollea, las imágenes ya están en caché y aparecen al
  // instante en vez de mostrar bloques negros esperando.
  useEffect(() => {
    let cancelled = false;
    const t = setTimeout(() => {
      if (cancelled) return;
      const seen = new Set();
      const urls = Array.from(document.querySelectorAll('#app img'))
        .map((im) => im.getAttribute('src'))
        .filter((s) => s && !s.startsWith('data:') && !seen.has(s) && seen.add(s));
      let i = 0;
      const CONC = 5;                       // 5 imágenes a la vez, en orden
      const next = () => {
        if (cancelled || i >= urls.length) return;
        const pre = new Image();
        pre.onload = pre.onerror = () => { if (!cancelled) next(); };
        pre.src = urls[i++];
      };
      for (let k = 0; k < CONC; k++) next();
    }, 350);                                // 350ms: deja renderizar la sección primero
    return () => { cancelled = true; clearTimeout(t); };
  }, [view]);

  const setLang = (l) => {setLangState(l);localStorage.setItem('atus_lang', l);};
  useEffect(() => {document.documentElement.lang = lang;}, [lang]);

  const jump = (id) => {
    // From a section view, jumping to hero/about/contact returns home
    if (id === 'design') { setView('design'); return; }
    if (id === 'illu') { setView('illu'); return; }
    if (id === 'hero') { setView('home'); window.scrollTo({top:0, behavior:'smooth'}); return; }
    // about/contact: must be on home for them to exist
    if (view !== 'home') {
      setViewState('home');
      setTimeout(() => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
      return;
    }
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  const openWork = (i) => setWorkIdx(i);
  const closeWork = () => setWorkIdx(null);
  const prevWork = () => setWorkIdx((i) => (i - 1 + WORKS.length) % WORKS.length);
  const nextWork = () => setWorkIdx((i) => (i + 1) % WORKS.length);

  useEffect(() => {
    if (view !== 'home') return;
    const ids = ['hero', 'about', 'contact'];
    const els = ids.map((id) => document.getElementById(id)).filter(Boolean);
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((en) => {if (en.isIntersecting) setActive(en.target.id);});
    }, { rootMargin: '-40% 0px -50% 0px', threshold: 0 });
    els.forEach((s) => obs.observe(s));
    return () => obs.disconnect();
  }, [view]);

  // When in design/illu views, mark them active
  useEffect(() => {
    if (view === 'design') setActive('design');
    else if (view === 'illu') setActive('illu');
  }, [view]);

  const sectionBar = (kind) => (
    <div className={`section-view-bar ${kind === 'illu' ? 'dark' : ''}`}>
      <button onClick={() => setView('home')} aria-label="Volver a inicio"><span>← Volver</span><span style={{opacity:.6,marginLeft:'8px'}}>Inicio</span></button>
    </div>
  );

  return (
    <>
      <Nav active={active} onJump={jump} lang={lang} setLang={setLang} view={view} setView={setView} />
      {view === 'home' &&
        <>
          <Hero lang={lang} onJump={jump} onEnter={setView} />
          <About lang={lang} />
          <Contact lang={lang} />
        </>
      }
      {view === 'design' &&
        <>
          {sectionBar('design')}
          <DesignSection lang={lang} onOpenProject={openProject} onSwitchView={setView} />
        </>
      }
      {view === 'illu' &&
        <>
          {sectionBar('illu')}
          <IlluSection lang={lang} onOpenWork={openWork} onSwitchView={setView}
            onReadComic={(s, m) => setReader({ open: true, start: s, mode: m })} />
        </>
      }
      <footer className="footer">
        <div className="wrap">
          <span>{I18N[lang].footer1}</span>
          <span>{I18N[lang].footer2}</span>
          <span>{I18N[lang].footer3}</span>
        </div>
      </footer>
      <WorkModal idx={workIdx} onClose={closeWork} onPrev={prevWork} onNext={nextWork} lang={lang} />
      <ProjectModal project={project} startIdx={projectStartIdx} onClose={() => setProject(null)} lang={lang} />
      <ComicReader open={reader.open} start={reader.start} mode={reader.mode}
      onClose={() => setReader((r) => ({ ...r, open: false }))} lang={lang} />
    </>);

}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
